<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS EPP - PDVSA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        [v-cloak] { display: none; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900">
    <div id="app" v-cloak class="max-w-xl mx-auto min-h-screen pb-32">
        
        <header class="p-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-rose-600 tracking-tighter">NEXUS <span class="text-slate-400">EPP</span></h1>
                <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Control de Dotación Industrial</p>
            </div>
            <button @click="modalNuevoTrabajador = true" class="bg-rose-100 text-rose-600 px-4 py-2 rounded-xl font-bold text-xs active:scale-95 transition-all">
                + Nuevo Personal
            </button>
        </header>

        <main class="px-6">
            <section v-if="!trabajadorSeleccionado">
                <div class="relative mb-6">
                    <input v-model="searchQuery" type="text" placeholder="Buscar por Nombre o Cédula..." 
                           class="w-full p-4 pl-12 rounded-2xl border-none shadow-sm focus:ring-2 focus:ring-rose-500 glass text-sm">
                    <span class="absolute left-4 top-4 opacity-30">🔍</span>
                </div>

                <div class="grid gap-3">
                    <div v-for="t in filtrados" :key="t.cedula" 
                         @click="seleccionarTrabajador(t)"
                         class="flex items-center p-5 rounded-[2rem] bg-white border border-slate-100 transition-all active:scale-95 card-shadow cursor-pointer">
                        <div class="flex-1">
                            <p class="font-bold text-slate-800 text-base" v-text="t.nombre"></p>
                            <div class="flex gap-2 mt-1">
                                <span class="px-2 py-0.5 bg-slate-100 text-slate-500 rounded text-[8px] font-black uppercase tracking-tighter" v-text="t.area"></span>
                                <span class="text-[9px] font-mono text-slate-400">C.I. {{t.cedula}}</span>
                            </div>
                        </div>
                        <div class="h-10 w-10 rounded-full bg-rose-50 flex items-center justify-center text-rose-500 font-bold text-xl">+</div>
                    </div>
                </div>

                <div v-if="trabajadores.length === 0" class="text-center py-20">
                    <p class="text-slate-400 text-sm">No hay trabajadores. Importa un Excel o agrega uno nuevo.</p>
                </div>
            </section>

            <section v-if="trabajadorSeleccionado" class="bg-white rounded-[2.5rem] p-8 shadow-2xl animate-in fade-in zoom-in duration-200">
                <button @click="trabajadorSeleccionado = null" class="mb-6 text-slate-400 font-bold text-sm flex items-center">
                    <span class="mr-2">←</span> Volver a la lista
                </button>
                <div class="mb-8">
                    <h2 class="text-2xl font-black text-slate-800 leading-tight">{{ trabajadorSeleccionado.nombre }}</h2>
                    <p class="text-xs text-rose-500 font-bold uppercase tracking-widest mt-1">{{ trabajadorSeleccionado.cargo }}</p>
                </div>

                <div class="space-y-5">
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-2 mb-2 block">Fecha de Entrega</label>
                        <input v-model="formEPP.fecha" type="date" class="w-full p-4 bg-slate-50 rounded-2xl border-none text-sm focus:ring-2 focus:ring-rose-500">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-2 mb-2 block">Equipo de Seguridad</label>
                        <select v-model="formEPP.equipo" class="w-full p-4 bg-slate-50 rounded-2xl border-none text-sm focus:ring-2 focus:ring-rose-500">
                            <option value="">Seleccione el equipo...</option>
                            <option v-for="e in listaEPP" :key="e" :value="e">{{e}}</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-2 mb-2 block">Talla / Observación</label>
                        <input v-model="formEPP.talla" type="text" placeholder="Ej: 42, L, Única" class="w-full p-4 bg-slate-50 rounded-2xl border-none text-sm focus:ring-2 focus:ring-rose-500">
                    </div>
                    <button @click="registrarEntrega" :disabled="isSyncing || !formEPP.equipo" 
                            class="w-full bg-rose-600 text-white py-5 rounded-[1.8rem] font-black shadow-lg active:scale-95 transition-all disabled:bg-slate-200">
                        {{ isSyncing ? 'REGISTRANDO...' : 'CONFIRMAR ENTREGA' }}
                    </button>
                </div>
            </section>
        </main>

        <div v-if="modalNuevoTrabajador" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm">
            <div class="bg-white w-full rounded-[2.5rem] p-8 max-w-sm card-shadow">
                <h3 class="text-xl font-black mb-4">Añadir Personal</h3>
                <div class="space-y-3">
                    <input v-model="nuevoT.nombre" type="text" placeholder="Nombre y Apellido" class="w-full p-3 bg-slate-100 rounded-xl text-sm border-none">
                    <input v-model="nuevoT.cedula" type="number" placeholder="Número de Cédula" class="w-full p-3 bg-slate-100 rounded-xl text-sm border-none">
                    <input v-model="nuevoT.cargo" type="text" placeholder="Cargo (ej: Pasante)" class="w-full p-3 bg-slate-100 rounded-xl text-sm border-none">
                    <input v-model="nuevoT.area" type="text" placeholder="Gerencia / Área" class="w-full p-3 bg-slate-100 rounded-xl text-sm border-none">
                </div>
                <div class="flex gap-2 mt-6">
                    <button @click="guardarNuevoTrabajador" class="flex-1 bg-rose-600 text-white py-3 rounded-xl font-bold text-sm active:scale-95">Guardar</button>
                    <button @click="modalNuevoTrabajador = false" class="flex-1 bg-slate-100 text-slate-500 py-3 rounded-xl font-bold text-sm">Cerrar</button>
                </div>
            </div>
        </div>

        <nav v-if="!trabajadorSeleccionado" class="fixed bottom-6 left-6 right-6 flex gap-2">
            <button @click="menuConfig = true" class="bg-white text-slate-400 p-5 rounded-3xl shadow-xl flex-1 text-xl">⚙️</button>
            <label class="bg-slate-900 text-white p-5 rounded-3xl shadow-xl flex-[3] font-bold text-[10px] text-center cursor-pointer uppercase tracking-widest flex items-center justify-center">
                📥 Importar Personal (Excel)
                <input type="file" @change="importarExcel" class="hidden" accept=".xlsx, .xls">
            </label>
        </nav>

        <div v-if="menuConfig" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm">
            <div class="bg-white w-full rounded-[2.5rem] p-8 max-w-sm">
                <h3 class="text-xl font-black mb-6 tracking-tight">Enlace con Google</h3>
                <label class="text-[10px] font-bold text-slate-400 ml-1 mb-1 block uppercase">App Script URL</label>
                <input v-model="config.googleSheetUrl" type="text" placeholder="https://script.google.com/..." class="w-full p-4 bg-slate-100 rounded-xl mb-6 text-xs font-mono border-none">
                <button @click="guardarConfig" class="w-full bg-rose-600 text-white py-4 rounded-xl font-bold text-sm shadow-lg active:scale-95">Guardar Cambios</button>
                <button @click="menuConfig = false" class="w-full text-slate-400 font-bold py-2 text-xs mt-2">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    trabajadores: JSON.parse(localStorage.getItem('epp_workers') || '[]'),
                    config: JSON.parse(localStorage.getItem('epp_cfg') || '{ "googleSheetUrl": "" }'),
                    searchQuery: '',
                    trabajadorSeleccionado: null,
                    modalNuevoTrabajador: false,
                    menuConfig: false,
                    isSyncing: false,
                    nuevoT: { nombre: '', cedula: '', cargo: '', area: '' },
                    formEPP: { equipo: '', talla: '', fecha: new Date().toISOString().split('T')[0] },
                    // LISTA ACTUALIZADA CON IMPERMEABLE
                    listaEPP: [
                        'Botas de Seguridad', 
                        'Casco de Seguridad', 
                        'Guantes de Carnaza', 
                        'Lentes de Protección', 
                        'Protector Auditivo', 
                        'Mascarilla N95', 
                        'Overol / Braga', 
                        'Faja Sacrolumbar',
                        'Impermeable'
                    ]
                }
            },
            computed: {
                filtrados() {
                    const s = this.searchQuery.toLowerCase();
                    return this.trabajadores.filter(t => 
                        t.nombre.toLowerCase().includes(s) || 
                        t.cedula.toString().includes(s)
                    );
                }
            },
            methods: {
                seleccionarTrabajador(t) {
                    this.trabajadorSeleccionado = t;
                    this.formEPP.equipo = '';
                    this.formEPP.talla = '';
                },
                async guardarNuevoTrabajador() {
                    if(!this.nuevoT.nombre || !this.nuevoT.cedula) {
                        return Swal.fire('Error', 'Nombre y Cédula son requeridos', 'error');
                    }
                    
                    this.isSyncing = true;
                    // Guardar en el celular
                    this.trabajadores.unshift({...this.nuevoT});
                    localStorage.setItem('epp_workers', JSON.stringify(this.trabajadores));

                    // Enviar a la nube si hay URL
                    if(this.config.googleSheetUrl) {
                        try {
                            await fetch(this.config.googleSheetUrl, {
                                method: 'POST', mode: 'no-cors',
                                body: JSON.stringify({ type: 'add_worker', data: this.nuevoT })
                            });
                        } catch(e) {}
                    }
                    
                    this.isSyncing = false;
                    this.modalNuevoTrabajador = false;
                    Swal.fire({ title: 'Añadido', text: 'El trabajador se agregó a la lista', icon: 'success', confirmButtonColor: '#e11d48' });
                },
                async registrarEntrega() {
                    if(!this.config.googleSheetUrl) {
                        return Swal.fire('Configuración', 'Por favor, pega la URL de Google Script en ajustes ⚙️', 'warning');
                    }
                    
                    this.isSyncing = true;
                    const payload = {
                        type: 'entrega',
                        data: { 
                            ...this.formEPP, 
                            nombre: this.trabajadorSeleccionado.nombre, 
                            cedula: this.trabajadorSeleccionado.cedula, 
                            puesto: this.trabajadorSeleccionado.cargo, 
                            unidad: this.trabajadorSeleccionado.area 
                        }
                    };

                    try {
                        await fetch(this.config.googleSheetUrl, {
                            method: 'POST', mode: 'no-cors',
                            body: JSON.stringify(payload)
                        });
                        
                        Swal.fire({
                            title: '¡Registrado!',
                            text: `${this.formEPP.equipo} entregado con éxito`,
                            icon: 'success',
                            confirmButtonColor: '#e11d48'
                        });
                        
                        this.trabajadorSeleccionado = null;
                    } catch(e) {
                        Swal.fire('Error', 'Fallo al conectar con el servidor', 'error');
                    } finally {
                        this.isSyncing = false;
                    }
                },
                importarExcel(e) {
                    const reader = new FileReader();
                    reader.onload = (f) => {
                         const wb = XLSX.read(f.target.result, { type: 'array' });
                        const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                        this.trabajadores = json.map(r => ({
                            nombre: r.Nombre || r.nombre,
                            cedula: r.Cedula || r.cedula,
                            cargo: r.Cargo || r.cargo,
                            area: r.Area || r.area
                        }));
                        localStorage.setItem('epp_workers', JSON.stringify(this.trabajadores));
                        Swal.fire('Carga Lista', `Se importaron ${this.trabajadores.length} trabajadores.`, 'success');
                    };
                    reader.readAsArrayBuffer(e.target.files[0]);
                },
                guardarConfig() {
                    localStorage.setItem('epp_cfg', JSON.stringify(this.config));
                    this.menuConfig = false;
                    Swal.fire('Guardado', 'La URL ha sido actualizada', 'success');
                }
            }
        }).mount('#app')
    </script>
</body>
</html>

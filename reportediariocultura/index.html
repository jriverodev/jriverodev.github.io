<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte Diario - Actividades Culturales</title>

    <meta name="theme-color" content="#1e3a8a">
    <meta name="mobile-web-app-capable" content="yes">
    
    <meta name="apple-touch-icon" content="icon.svg">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="shortcut icon" href="/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<link rel="manifest" href="/site.webmanifest" />
    <style>
        /* Estilos personalizados para mejorar la experiencia en móvil */
        input:focus, textarea:focus {
            border-color: #1e3a8a !important;
            box-shadow: 0 0 0 2px rgba(30, 58, 138, 0.2) !important;
        }
        .form-label {
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 0.25rem;
            display: block;
        }
        #btnInstall { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <header class="bg-blue-900 text-white p-4 shadow-lg flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl font-bold italic tracking-tight">Reporte Diario</h1>
        <button id="btnInstall" class="bg-white text-blue-900 px-4 py-1 rounded-full text-sm font-bold flex items-center">
            <i class="bi bi-download mr-2"></i> Instalar
        </button>
    </header>

    <main class="max-w-xl mx-auto p-4 mt-2">
        
        <div class="bg-white rounded-2xl shadow-xl p-6 border border-slate-200">
            <form id="formReporte" class="space-y-5">
                
                <div>
                    <label class="form-label" for="fecha">Fecha</label>
                    <div class="relative">
                        <i class="bi bi-calendar-event absolute left-3 top-3 text-slate-400"></i>
                        <input type="date" id="fecha" name="fecha" required 
                               class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none transition-all">
                    </div>
                </div>

                <div>
                    <label class="form-label" for="institucion">Institución / Escuela de Gaita</label>
                    <textarea id="institucion" name="institucion" rows="2" placeholder="Nombre y Ubicación" required
                              class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none transition-all"></textarea>
                </div>

                <div>
                    <label class="form-label" for="actividad">Actividad Realizada</label>
                    <textarea id="actividad" name="actividad" rows="3" placeholder="Describa la actividad..." required
                              class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none transition-all"></textarea>
                </div>

                <div>
                    <label class="form-label">Horario (de / a)</label>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="time" id="hora_inicio" name="hora_inicio" required
                               class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none transition-all">
                        <input type="time" id="hora_fin" name="hora_fin" required
                               class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none transition-all">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="form-label" for="impactada">Población Impactada</label>
                        <input type="number" id="impactada" name="impactada" placeholder="0" required
                               class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none transition-all">
                    </div>
                    <div>
                        <label class="form-label" for="atendida">Población Atendida</label>
                        <input type="number" id="atendida" name="atendida" placeholder="0" required
                               class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none transition-all">
                    </div>
                </div>

                <div>
                    <label class="form-label" for="equipo">Equipo de Trabajo (Instrumentos)</label>
                    <input type="text" id="equipo" name="equipo" placeholder="Ej: furro, tambora, charrasca..."
                           class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none transition-all">
                </div>

                <div>
                    <label class="form-label" for="instructores">Instructores</label>
                    <textarea id="instructores" name="instructores" rows="3" placeholder="Nombres de los instructores..." required
                              class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none transition-all"></textarea>
                </div>

                <div class="flex flex-col gap-3 pt-4">
                    <button type="submit" id="btnEnviar" 
                            class="w-full bg-blue-900 text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:bg-blue-800 transition-all flex justify-center items-center gap-2">
                        <i class="bi bi-cloud-upload"></i> Guardar Reporte
                    </button>
                    
                    <button type="button" id="btnWhatsApp" 
                            class="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:bg-emerald-500 transition-all flex justify-center items-center gap-2">
                        <i class="bi bi-whatsapp"></i> Compartir WhatsApp
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>

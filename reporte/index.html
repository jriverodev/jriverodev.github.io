<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUM - División Lago</title>

    <meta name="theme-color" content="#1e3a8a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.svg">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root { --primary: #1e3a8a; }
        .dark { --primary: #0f172a; }
        #btnInstall { display: none; }
        .highlight { animation: highlight 900ms ease; border: 2px solid #1e3a8a !important; }
        @keyframes highlight { 0% { transform: scale(1.02); } 100% { transform: scale(1); } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>

    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-100 dark:bg-slate-900 min-h-screen pb-40 font-sans text-slate-800 dark:text-slate-200 transition-colors duration-300">

    <div id="splash-screen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-blue-900 transition-opacity duration-500">
        <div class="relative animate-pulse text-blue-200">
            <i class="bi bi-anchor text-8xl"></i>
            <div class="absolute -bottom-10 left-1/2 -translate-x-1/2">
                <div class="w-8 h-8 border-4 border-blue-200/30 border-t-blue-200 rounded-full animate-spin"></div>
            </div>
        </div>
        <h2 class="mt-16 text-white font-black tracking-[0.3em] uppercase text-[10px]">Cargando Operaciones OUM</h2>
        <p class="text-blue-300 text-[8px] mt-2 uppercase italic">División Lago - SSL</p>
    </div>

    <nav class="bg-blue-900 dark:bg-slate-950 text-white p-4 shadow-xl sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <i class="bi bi-anchor text-blue-300"></i>
            <h1 class="font-bold tracking-tight uppercase text-[10px]">OUM - División Lago</h1>
        </div>
        <button onclick="toggleDarkMode()" class="text-xl px-2"><i id="darkIcon" class="bi bi-moon-stars-fill"></i></button>
    </nav>

    <main class="max-w-3xl mx-auto p-4 space-y-5">

        <div class="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700">
            <h2 class="font-bold text-slate-400 mb-3 text-[9px] uppercase tracking-widest">Parámetros del Reporte</h2>
            <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-[9px] font-black text-blue-600 uppercase mb-1">Fecha</label>
                    <input type="date" id="fecha_rep" class="w-full p-2 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl font-bold text-xs outline-none">
                </div>
                <div>
                    <label class="block text-[9px] font-black text-blue-600 uppercase mb-1">Hora Reporte</label>
                    <input type="time" id="hora_rep" class="w-full p-2 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl font-bold text-xs outline-none">
                </div>
                <div class="col-span-2 md:col-span-1">
                    <label class="block text-[9px] font-black text-slate-400 uppercase mb-1">Backup Datos</label>
                    <div class="flex gap-2">
                        <button onclick="respaldarDatos()" class="flex-1 bg-slate-700 text-white py-2 rounded-lg text-[9px] font-bold uppercase"><i class="bi bi-cloud-arrow-down"></i></button>
                        <button onclick="document.getElementById('fileImport').click()" class="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 py-2 rounded-lg text-[9px] font-bold uppercase"><i class="bi bi-cloud-arrow-up"></i></button>
                    </div>
                    <input type="file" id="fileImport" class="hidden" accept=".json" onchange="procesarRestauracion(event)">
                </div>
            </div>
        </div>

        <div class="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700">
            <h2 class="font-bold text-blue-700 dark:text-blue-400 mb-4 flex items-center gap-2 text-[10px] uppercase italic">
                <i class="bi bi-plus-circle-fill"></i> Nueva Entrada Operacional
            </h2>
            <div class="space-y-3">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <select id="seccion" class="p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl font-bold text-xs">
                        <option value="REMOLQUE">Operaciones de Remolque</option>
                        <option value="SUMINISTRO">Suministro Lacustre</option>
                        <option value="RECOLECTORES">Recolectores de Crudo</option>
                        <option value="MUDANZA">Mudanza y Boyado</option>
                        <option value="BOMBAS">Bombas Operativas</option>
                        <option value="MTTO">En Mantenimiento / Próximas</option>
                    </select>
                    <select id="estatus" class="p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl font-bold text-xs">
                        <option value="OP">OPERATIVO (OP)</option>
                        <option value="F/S">FUERA DE SERVICIO (F/S)</option>
                        <option value="STAND-BY">EN ESPERA (STAND-BY)</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="unidad" placeholder="Nombre Unidad" class="p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none font-bold uppercase text-xs">
                    <input type="text" id="asignacion" placeholder="Contrato / Asignación" class="p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none font-bold text-xs">
                </div>

                <textarea id="actividad" placeholder="Escriba la actividad o novedad aquí..." class="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-xs outline-none h-20"></textarea>

                <button onclick="guardarRegistro()" class="w-full bg-blue-800 dark:bg-blue-600 text-white font-bold rounded-xl py-3 shadow-lg uppercase text-[10px] italic">Añadir al Reporte</button>
            </div>
        </div>

        <div id="contenedor_reporte" class="space-y-6 pb-10"></div>

    </main>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/90 dark:bg-slate-950/90 backdrop-blur-md border-t border-slate-200 dark:border-slate-800 grid grid-cols-2 md:grid-cols-4 gap-3 z-40 shadow-2xl">
        <button onclick="exportarExcel()" class="bg-emerald-700 text-white py-3 rounded-xl font-bold text-[10px] uppercase shadow-lg"><i class="bi bi-file-earmark-excel"></i> Excel</button>
        <button onclick="enviarWhatsApp()" class="bg-green-600 text-white py-3 rounded-xl font-bold text-[10px] uppercase shadow-lg"><i class="bi bi-whatsapp"></i> WhatsApp</button>
        <button id="btnInstall" class="bg-indigo-600 text-white py-3 rounded-xl font-bold text-[10px] uppercase">Instalar App</button>
        <button onclick="limpiarDB()" class="bg-red-600 text-white py-3 rounded-xl font-bold text-[10px] uppercase">Reiniciar Hoy</button>
    </div>

    <script>
        const DB_KEY = 'db_oum_final_v1';
        let baseDatos = JSON.parse(localStorage.getItem(DB_KEY) || '[]');

        const titulosWhatsApp = {
            "REMOLQUE": "✅ *Operaciones de Remolque*",
            "SUMINISTRO": "✅ *Operaciones de Suministro Lacustre*",
            "RECOLECTORES": "*> Recolectores de Crudo <*",
            "MUDANZA": "✅ *Operaciones de Mudanza y Boyado*",
            "BOMBAS": "*BOMBAS OPERATIVAS*",
            "MTTO": "🚨 *UNIDADES EN MANTENIMIENTO / PROXIMAS*"
        };

        $(document).ready(function() {
            // Inicializar fecha y hora
            const ahora = new Date();
            document.getElementById('fecha_rep').valueAsDate = ahora;
            document.getElementById('hora_rep').value = ahora.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });

            setTimeout(() => {
                $('#splash-screen').addClass('opacity-0');
                setTimeout(() => $('#splash-screen').remove(), 500);
            }, 1200);
            
            // Dark mode automático
            const horaActual = ahora.getHours();
            if (horaActual >= 18 || horaActual < 6) toggleDarkMode(true);
            
            renderLista();
        });

        function toggleDarkMode(force) {
            const isDark = force !== undefined ? force : !$('body').hasClass('dark');
            $('body').toggleClass('dark', isDark);
            $('#darkIcon').toggleClass('bi-moon-stars-fill', !isDark).toggleClass('bi-sun-fill', isDark);
        }

        function guardarRegistro() {
            const seccion = $('#seccion').val();
            const unidad = $('#unidad').val().trim();
            const estatus = $('#estatus').val();
            const actividad = $('#actividad').val().trim();
            const asignacion = $('#asignacion').val().trim();

            if(!unidad || !actividad) return Swal.fire('Faltan Datos', 'Indique la unidad y la actividad', 'warning');

            const reg = { id: Date.now(), seccion, unidad, estatus, actividad, asignacion };
            baseDatos.push(reg);
            localStorage.setItem(DB_KEY, JSON.stringify(baseDatos));
            
            $('#unidad, #actividad, #asignacion').val('');
            renderLista();
            
            const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 1500 });
            Toast.fire({ icon: 'success', title: 'Registro guardado' });
        }

        function renderLista() {
            const cont = $('#contenedor_reporte');
            cont.empty();

            Object.keys(titulosWhatsApp).forEach(key => {
                const items = baseDatos.filter(r => r.seccion === key);
                if(items.length > 0) {
                    let html = `<div class="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700">
                        <h2 class="font-bold text-blue-900 dark:text-blue-300 mb-4 text-[9px] uppercase italic border-b dark:border-slate-700 pb-2">${titulosWhatsApp[key].replace(/\*/g, '')}</h2>
                        <div class="space-y-3">`;
                    
                    items.forEach(u => {
                        html += `
                        <div class="p-3 bg-slate-50 dark:bg-slate-900 border-l-4 ${u.estatus==='OP'?'border-green-500':'border-red-500'} rounded-r-lg relative">
                            <button onclick="eliminar(${u.id})" class="absolute top-2 right-2 text-slate-300 hover:text-red-500"><i class="bi bi-trash"></i></button>
                            <div class="font-black text-[10px] uppercase">${u.unidad} <span class="text-slate-400">(${u.estatus})</span></div>
                            <div class="text-[10px] text-slate-500 mt-1">${u.actividad}</div>
                        </div>`;
                    });
                    html += `</div></div>`;
                    cont.append(html);
                }
            });
            if(baseDatos.length === 0) {
                cont.append('<div class="text-center py-10 opacity-30 text-xs uppercase tracking-widest">No hay datos registrados hoy</div>');
            }
        }

        function eliminar(id) {
            baseDatos = baseDatos.filter(r => r.id !== id);
            localStorage.setItem(DB_KEY, JSON.stringify(baseDatos));
            renderLista();
        }

        function enviarWhatsApp() {
            const fechaInput = $('#fecha_rep').val().split('-');
            const fechaFormateada = `${fechaInput[2]}-${fechaInput[1]}-${fechaInput[0]}`;
            const horaManual = $('#hora_rep').val();
            
            let msg = `*REPORTE INFORMATIVO*\n`;
            msg += `*NEGOCIO*: *DEP OCCIDENTE / División Lago/Mtto Lago/SSL/OUM*\n`;
            msg += `*ESTADO*: ZULIA\n`;
            msg += `*FECHA*: ${fechaFormateada}\n`;
            msg += `*HORA*: ${horaManual}Hrs\n`;
            msg += `*ASUNTO*: Estatus actual de las actividades Operacionales de Unidades Mayores.\n\n`;

            Object.keys(titulosWhatsApp).forEach(key => {
                const items = baseDatos.filter(r => r.seccion === key);
                if(items.length > 0) {
                    msg += `${titulosWhatsApp[key]}\n\n`;
                    items.forEach(u => {
                        msg += `✓ *${u.unidad}* : (${u.estatus})\n`;
                        if(u.asignacion) msg += `*Asignación*: ${u.asignacion}\n`;
                        msg += `*Actividad*: ${u.actividad}\n\n`;
                    });
                }
            });

            msg += `*FUENTE*: Ing. Xavier Rivero - Gte de Guardia OUM`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function respaldarDatos() {
            const blob = new Blob([JSON.stringify(baseDatos)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Backup_OUM_${$('#fecha_rep').val()}.json`;
            a.click();
        }

        function procesarRestauracion(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    baseDatos = JSON.parse(ev.target.result);
                    localStorage.setItem(DB_KEY, JSON.stringify(baseDatos));
                    renderLista();
                    Swal.fire('Restaurado', 'Se han cargado los datos del respaldo', 'success');
                } catch(e) { Swal.fire('Error', 'Archivo no válido', 'error'); }
            };
            reader.readAsText(e.target.files[0]);
        }

        function exportarExcel() {
            const ws = XLSX.utils.json_to_sheet(baseDatos);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Data_OUM");
            XLSX.writeFile(wb, `Reporte_Excel_OUM_${$('#fecha_rep').val()}.xlsx`);
        }

        function limpiarDB() {
            Swal.fire({ 
                title: '¿Reiniciar Reporte?', 
                text: 'Se borrarán todos los registros actuales de la pantalla.',
                icon: 'warning', 
                showCancelButton: true,
                confirmButtonColor: '#d33',
                confirmButtonText: 'Sí, borrar todo'
            }).then(r => {
                if(r.isConfirmed) { baseDatos = []; localStorage.removeItem(DB_KEY); renderLista(); }
            });
        }
    </script>
</body>
</html>

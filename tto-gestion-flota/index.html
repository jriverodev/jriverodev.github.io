
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ingreso - Gestión TTO</title>
    <link rel="stylesheet" href="css/estilos.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="body-login">
    <div class="login-container">
        <div class="login-logo">⚙️</div>
        <h2>Transporte Terrestre</h2>
        <p>Ingrese su credencial de acceso</p>
        
        <form id="formLogin">
            <div class="input-group">
                <input type="password" id="txtPassword" placeholder="Contraseña Operativa" required>
            </div>
            <button type="submit" class="btn-login">Validar Acceso</button>
        </form>
    </div>
    <script src="js/app.js"></script>
</body>
</html>

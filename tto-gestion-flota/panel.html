<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Operativo - TTOCC</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="data:,">
    <script src="js/app.js"></script>
    <script src="js/panel.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col justify-between antialiased">

    <nav class="w-full bg-slate-950 border-b border-slate-800 px-4 py-3 flex justify-between items-center sticky top-0 z-40">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-sliders text-blue-500 text-xl"></i>
            <div>
                <h1 class="font-black text-white text-sm uppercase tracking-wide leading-tight">Consola de Patio</h1>
                <p class="text-[9px] text-slate-400 uppercase tracking-widest block">Actualización Rápida Inline</p>
            </div>
        </div>
        
        <div class="flex items-center gap-2">
            <button onclick="cargarTablaEditable()" class="bg-slate-800 hover:bg-slate-700 text-blue-400 font-bold px-3 py-2 rounded-xl text-xs transition-colors border border-slate-700 flex items-center gap-1 cursor-pointer">
                <i class="fa-solid fa-rotate text-xs"></i> Recargar
            </button>
            <a href="visor.html" class="bg-blue-950/40 hover:bg-blue-900 text-blue-400 font-bold px-3 py-2 rounded-xl text-xs transition-colors border border-blue-500/30 flex items-center gap-1.5">
                <i class="fa-solid fa-chart-pie"></i> Ver Visor
            </a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto w-full p-4 flex-grow space-y-4">
        
        <div class="bg-slate-950/40 border border-slate-800 rounded-2xl overflow-hidden shadow-2xl">
            <div class="px-4 py-3 bg-slate-950 border-b border-slate-800 flex justify-between items-center">
                <h3 class="text-xs font-bold uppercase tracking-wider text-white"><i class="fa-solid fa-pen-to-square mr-1 text-blue-400"></i> Edición Directa en Matriz</h3>
                <span class="text-[9px] text-emerald-400 bg-emerald-950/50 px-2 py-0.5 rounded font-mono uppercase tracking-wider border border-emerald-500/20">Conexión Live</span>
            </div>

            <div class="overflow-x-auto w-full chunk-touch-scrolling">
                <table class="w-full text-left border-collapse min-w-[1050px]">
                    <thead>
                        <tr class="bg-slate-900 text-[10px] font-bold tracking-wider text-slate-400 border-b border-slate-800 uppercase">
                            <th class="p-3 w-20">ID Reg</th>
                            <th class="p-3 w-32">Unidad / Marca</th>
                            <th class="p-3 w-36">Fosa / Taller</th>
                            <th class="p-3 w-44">Porcentaje de Avance</th>
                            <th class="p-3 w-36">Estatus Operativo</th>
                            <th class="p-3">Observaciones Técnicas de Patio</th>
                            <th class="p-3 text-center w-20">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tablaEditableCuerpo" class="divide-y divide-slate-800/40 text-xs font-medium text-slate-300">
                        <tr>
                            <td colspan="7" class="p-6 text-center text-slate-500 uppercase tracking-widest text-[10px] font-bold">Iniciando matriz editable...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="w-full text-center py-2.5 bg-slate-950 border-t border-slate-800/60 text-[10px] text-slate-500 uppercase tracking-widest">
        Área de Control Operativo — Entrada Directa de Datos
    </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel de Carga - TTO</title>
    <link rel="stylesheet" href="css/estilos.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <button id="btnCerrarSesion" class="btn-back">⬅ Cerrar</button>
            <h1>Panel de Carga</h1>
            <div id="syncBadge" class="badge-sync synced">Sincronizado</div>
        </header>

        <main class="app-main">
            <form id="formRegistro">
                <div class="form-group">
                    <label for="txtUnidad">ID / Placa de la Unidad</label>
                    <input type="text" id="txtUnidad" placeholder="Ej: GTE-1024" required>
                </div>

                <div class="form-group">
                    <label for="ddlFlota">Tipo de Flota</label>
                    <select id="ddlFlota" required>
                        <option value="PESADA">Pesada</option>
                        <option value="LIVIANA">Liviana</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="ddlTaller">Taller Asignado</label>
                    <select id="ddlTaller" required>
                        <option value="LA SALINA">LA SALINA</option>
                        <option value="LAGUNILLAS">LAGUNILLAS</option>
                        <option value="LAGO MEDIO">LAGO MEDIO</option>
                        <option value="EXTERNO">TALLER EXTERNO</option>
                    </select>
                </div>

                <div class="form-group hidden" id="groupExterno">
                    <label for="txtTallerExt">Nombre del Taller Externo</label>
                    <input type="text" id="txtTallerExt" placeholder="Ej: Rectificadora Zulia C.A.">
                </div>

                <div class="form-group">
                    <label for="ddlEstatus">Estatus Operativo</label>
                    <select id="ddlEstatus" required>
                        <option value="Por Atender">Por Atender</option>
                        <option value="En Proceso">En Proceso</option>
                        <option value="Atendido">Atendido</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="txtObservaciones">Observaciones / Diagnóstico</label>
                    <textarea id="txtObservaciones" rows="4" placeholder="Detalle del mantenimiento técnico requerido o ejecutado..." required></textarea>
                </div>

                <button type="submit" class="btn-submit">Guardar Registro</button>
            </form>
        </main>
    </div>
    <script src="js/app.js"></script>
    <script src="js/panel.js"></script>
</body>
</html>

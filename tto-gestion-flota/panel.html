<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTOCC System - Gestión de Flota</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">

  <div class="flex flex-col md:flex-row min-h-screen">
    
    <main class="flex-1 p-6">
      <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 pb-4 border-b border-gray-200">
        <div>
          <h1 class="text-3xl font-bold text-gray-800">Historial de Mantenimiento</h1>
          <p class="text-sm text-gray-600 mt-1">Control de estado físico, fosa, gerencia usuaria y reportes de unidades.</p>
        </div>
        <button onclick="abrirModalCrear()" class="mt-4 md:mt-0 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-5 rounded-lg shadow transition duration-200 flex items-center gap-2">
          ➕ Registrar Unidad
        </button>
      </div>

      <div class="bg-white rounded-xl shadow overflow-hidden">
        <div class="overflow-x-auto">
          <table class="min-w-full leading-normal">
            <thead>
              <tr class="bg-gray-800 text-white text-left text-xs uppercase tracking-wider font-semibold">
                <th class="px-5 py-3">ID</th>
                <th class="px-5 py-3">Unidad</th>
                <th class="px-5 py-3">Flota</th>
                <th class="px-5 py-3">Ubicación / Fosa</th>
                <th class="px-5 py-3">Gerencia Usuaria</th>
                <th class="px-5 py-3">Chofer</th>
                <th class="px-5 py-3">Progreso</th>
                <th class="px-5 py-3">Estatus</th>
                <th class="px-5 py-3 text-center">Acciones</th>
              </tr>
            </thead>
            <tbody id="tabla_historial" class="text-gray-700 text-sm divide-y divide-gray-200">
              <tr>
                <td colspan="9" class="text-center py-10 text-gray-500 animate-pulse">Cargando registros de flota...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div id="modal_registro" class="fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center hidden p-4 z-50">
    <div class="bg-white rounded-xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
      
      <div class="bg-gray-800 p-4 text-white flex justify-between items-center rounded-t-xl">
        <h3 id="modal_titulo" class="text-lg font-bold">Registrar Control de Unidad</h3>
        <button onclick="cerrarModal()" class="text-gray-400 hover:text-white font-bold text-xl">&times;</button>
      </div>

      <form id="form_unidad" onsubmit="procesarFormulario(event)" class="p-6 space-y-4">
        <input type="hidden" id="id_registro">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-gray-700 font-semibold mb-1" for="unidad">Número de Unidad</label>
            <input type="text" id="unidad" required class="w-full border border-gray-300 p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="block text-gray-700 font-semibold mb-1" for="flota">Tipo de Flota</label>
            <input type="text" id="flota" placeholder="Ej. Pesada, Liviana" class="w-full border border-gray-300 p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-gray-700 font-semibold mb-1" for="nombre_taller">Ubicación / Fosa</label>
            <select id="nombre_taller" onchange="alternarTallerExterno()" required class="w-full border border-gray-300 p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none">
              <option value="">-- Seleccione Ubicación --</option>
              <option value="Fosa 1">Fosa 1</option>
              <option value="Fosa 2">Fosa 2</option>
              <option value="Lavadero">Lavadero</option>
              <option value="Zona de Espera">Zona de Espera</option>
              <option value="Taller Externo">Taller Externo</option>
            </select>
          </div>
          <div>
            <label class="block text-gray-700 font-semibold mb-1" for="marca">Marca / Modelo</label>
            <input type="text" id="marca" placeholder="Ej. Toyota, Mack" class="w-full border border-gray-300 p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
        </div>

        <div id="contenedor_taller_ext" class="hidden bg-yellow-50 p-3 border border-yellow-200 rounded">
          <label class="block text-yellow-800 font-semibold mb-1" for="nombre_taller_ext">Nombre del Taller Externo</label>
          <input type="text" id="nombre_taller_ext" placeholder="Indique nombre de la empresa externa" class="w-full border border-yellow-300 p-2 rounded focus:ring-2 focus:ring-yellow-500 outline-none">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-gray-700 font-semibold mb-1" for="gerencia_usuaria">Gerencia Usuaria</label>
            <select id="gerencia_usuaria" onchange="alternarOtraGerencia()" required class="w-full border border-gray-300 p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none">
              <option value="">-- Seleccione Gerencia --</option>
              <option value="Operaciones">Operaciones</option>
              <option value="Logística">Logística / Transporte</option>
              <option value="Mantenimiento">Mantenimiento</option>
              <option value="Seguridad Integral / PCP">Seguridad Integral / PCP</option>
              <option value="Servicios Logísticos">Servicios Logísticos</option>
              <option value="Otra">Otra (Escribir manualmente)</option>
            </select>
          </div>
          <div>
            <label class="block text-gray-700 font-semibold mb-1" for="chofer_usuario">Chofer / Responsable</label>
            <input type="text" id="chofer_usuario" placeholder="Nombre de quien entrega" class="w-full border border-gray-300 p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
        </div>

        <div id="contenedor_otra_gerencia" class="hidden bg-blue-50 p-3 border border-blue-200 rounded">
          <label class="block text-blue-800 font-semibold mb-1" for="otra_gerencia">Escriba el nombre de la Gerencia</label>
          <input type="text" id="otra_gerencia" placeholder="Ej. Finanzas y Presupuesto" class="w-full border border-blue-300 p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-gray-700 font-semibold mb-1" for="estatus">Estatus Actual</label>
            <select id="estatus" class="w-full border border-gray-300 p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none">
              <option value="Por Atender">Por Atender</option>
              <option value="En Diagnóstico">En Diagnóstico</option>
              <option value="En Reparación">En Reparación</option>
              <option value="Espera de Repuesto">Espera de Repuesto</option>
              <option value="Listo">Listo</option>
            </select>
          </div>
          <div>
            <label class="block text-gray-700 font-semibold mb-1" for="avance">Porcentaje de Avance (%)</label>
            <input type="number" id="avance" min="0" max="100" class="w-full border border-gray-300 p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-gray-700 font-semibold mb-1" for="fecha_ingreso">Fecha Ingreso</label>
            <input type="text" id="fecha_ingreso" placeholder="dd-mm-aaaa (Vacio = Hoy)" class="w-full border border-gray-300 p-2 rounded outline-none">
          </div>
          <div>
            <label class="block text-gray-700 font-semibold mb-1" for="fecha_salida">Fecha Salida</label>
            <input type="text" id="fecha_salida" placeholder="Automático al poner Listo" class="w-full border border-gray-300 p-2 rounded outline-none">
          </div>
        </div>

        <div>
          <label class="block text-gray-700 font-semibold mb-1" for="observaciones">Observaciones / Falla Reportada</label>
          <textarea id="observaciones" rows="2" class="w-full border border-gray-300 p-2 rounded outline-none"></textarea>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-gray-50 p-3 rounded border border-gray-200">
          <div>
            <label class="block text-gray-700 text-xs font-bold mb-1 uppercase">Foto Antes (Ingreso)</label>
            <input type="file" id="foto_antes" accept="image/*" class="text-xs w-full">
            <input type="hidden" id="foto_antes_url">
          </div>
          <div>
            <label class="block text-gray-700 text-xs font-bold mb-1 uppercase">Foto Después (Salida)</label>
            <input type="file" id="foto_despues" accept="image/*" class="text-xs w-full">
            <input type="hidden" id="foto_despues_url">
          </div>
        </div>

        <div class="flex justify-end gap-2 pt-2 border-t border-gray-100">
          <button type="button" onclick="cerrarModal()" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded transition">Cancelar</button>
          <button type="submit" id="btn_guardar" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded shadow transition">Sincronizar</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // ⚠️ REEMPLAZA ESTA URL POR LA DE TU IMPLEMENTACIÓN DE GOOGLE APPS SCRIPT
    const WEB_APP_URL = "https://script.google.com/macros/s/TU_ID_DE_DESPLIEGUE/exec"; 
    
    let cacheDatos = []; // Almacenamiento local de los registros de la fosa

    // Al cargar la ventana, leer el backend de inmediato
    window.addEventListener("DOMContentLoaded", cargarDatos);

    /**
     * Consume la API de Apps Script para leer las 16 columnas
     */
    async function cargarDatos() {
      try {
        const respuesta = await fetch(WEB_APP_URL, {
          method: "POST",
          body: JSON.stringify({ accion: "leer" })
        });
        const resultado = await respuesta.json();
        
        if (resultado.status === "SUCCESS") {
          cacheDatos = resultado.datos;
          renderizarTabla(cacheDatos);
        } else {
          alert("Error de lectura backend: " + resultado.message);
        }
      } catch (e) {
        console.error(e);
        document.getElementById("tabla_historial").innerHTML = `<tr><td colspan="9" class="text-center py-6 text-red-500 font-bold">Error de conexión con el Servidor Google App Script.</td></tr>`;
      }
    }

    /**
     * Dibuja los datos en las filas de la tabla de control
     */
    function renderizarTabla(datos) {
      const tbody = document.getElementById("tabla_historial");
      if (datos.length === 0) {
        tbody.innerHTML = `<tr><td colspan="9" class="text-center py-6 text-gray-500">No hay registros activos en historial.</td></tr>`;
        return;
      }

      tbody.innerHTML = "";
      datos.forEach((item, index) => {
        // Formatear colores del Estatus de la unidad
        let colorEstatus = "bg-gray-200 text-gray-800";
        if (item["ESTATUS"] === "Listo") colorEstatus = "bg-green-100 text-green-800 font-bold";
        if (item["ESTATUS"] === "En Reparación") colorEstatus = "bg-amber-100 text-amber-800";
        if (item["ESTATUS"] === "Por Atender") colorEstatus = "bg-red-100 text-red-800";

        tbody.innerHTML += `
          <tr class="hover:bg-gray-50 transition">
            <td class="px-5 py-3 border-b border-gray-200 font-bold text-blue-600">${item["ID_REGISTRO"]}</td>
            <td class="px-5 py-3 border-b border-gray-200 font-semibold">${item["UNIDAD"]}</td>
            <td class="px-5 py-3 border-b border-gray-200">${item["FLOTA"] || "S/I"}</td>
            <td class="px-5 py-3 border-b border-gray-200">${item["FOSA"] === "Taller Externo" ? '🏭 ' + item["TALLER_EXT"] : '🔧 ' + item["FOSA"]}</td>
            <td class="px-5 py-3 border-b border-gray-200 text-xs">${item["GERENCIA_USUARIA"] || "S/I"}</td>
            <td class="px-5 py-3 border-b border-gray-200 text-xs italic">${item["CHOFER_RESPONSABLE"] || "No Asignado"}</td>
            <td class="px-5 py-3 border-b border-gray-200">
              <div class="w-full bg-gray-200 rounded-full h-2">
                <div class="bg-blue-600 h-2 rounded-full" style="width: ${item["AVANCE"]}%"></div>
              </div>
              <span class="text-xs text-gray-500">${item["AVANCE"]}%</span>
            </td>
            <td class="px-5 py-3 border-b border-gray-200">
              <span class="px-2.5 py-1 inline-flex text-xs leading-5 rounded-full ${colorEstatus}">${item["ESTATUS"]}</span>
            </td>
            <td class="px-5 py-3 border-b border-gray-200 text-center">
              <button onclick="abrirModalEditar(${index})" class="bg-amber-500 hover:bg-amber-600 text-white font-bold py-1 px-3 text-xs rounded transition shadow">
                ✏️ Editar
              </button>
            </td>
          </tr>
        `;
      });
    }

    // =========================================================================
    // INTERFACES DINÁMICAS (CAMPOS VISIBLES/OCULTOS)
    // =========================================================================
    function alternarTallerExterno() {
      const selectTaller = document.getElementById("nombre_taller");
      const contenedorExt = document.getElementById("contenedor_taller_ext");
      if (selectTaller.value === "Taller Externo") {
        contenedorExt.classList.remove("hidden");
      } else {
        contenedorExt.classList.add("hidden");
        document.getElementById("nombre_taller_ext").value = "";
      }
    }

    function alternarOtraGerencia() {
      const selectGerencia = document.getElementById("gerencia_usuaria");
      const contenedorOtra = document.getElementById("contenedor_otra_gerencia");
      if (selectGerencia.value === "Otra") {
        contenedorOtra.classList.remove("hidden");
        document.getElementById("otra_gerencia").focus();
      } else {
        contenedorOtra.classList.add("hidden");
        document.getElementById("otra_gerencia").value = "";
      }
    }

    // =========================================================================
    // MODALES: APERTURA Y CAPTURA DE DATOS
    // =========================================================================
    function abrirModalCrear() {
      document.getElementById("form_unidad").reset();
      document.getElementById("id_registro").value = "";
      document.getElementById("modal_titulo").innerText = "Registrar Nueva Unidad en Flota";
      document.getElementById("contenedor_taller_ext").classList.add("hidden");
      document.getElementById("contenedor_otra_gerencia").classList.add("hidden");
      
      // Bloquear campos de salida para registros nuevos
      document.getElementById("fecha_salida").disabled = true;
      document.getElementById("foto_despues").disabled = true;
      
      document.getElementById("modal_registro").classList.remove("hidden");
    }

    function abrirModalEditar(index) {
      document.getElementById("form_unidad").reset();
      const item = cacheDatos[index];

      document.getElementById("modal_titulo").innerText = `Modificar Unidad: ${item["UNIDAD"]}`;
      document.getElementById("id_registro").value = item["ID_REGISTRO"];
      document.getElementById("unidad").value = item["UNIDAD"];
      document.getElementById("flota").value = item["FLOTA"];
      document.getElementById("marca").value = item["MARCA"];
      document.getElementById("estatus").value = item["ESTATUS"];
      document.getElementById("avance").value = item["AVANCE"];
      document.getElementById("observaciones").value = item["OBSERVACIONES"];
      document.getElementById("fecha_ingreso").value = item["FECHA_INGRESO"];
      document.getElementById("fecha_salida").value = item["FECHA_SALIDA"] || "";
      document.getElementById("chofer_usuario").value = item["CHOFER_RESPONSABLE"] || "";
      
      // Habilitar campos de cierre ya que es una edición
      document.getElementById("fecha_salida").disabled = false;
      document.getElementById("foto_despues").disabled = false;

      // Evaluar estado del taller fosa externo
      document.getElementById("nombre_taller").value = item["FOSA"];
      if (item["FOSA"] === "Taller Externo") {
        document.getElementById("contenedor_taller_ext").classList.remove("hidden");
        document.getElementById("nombre_taller_ext").value = item["TALLER_EXT"];
      } else {
        document.getElementById("contenedor_taller_ext").classList.add("hidden");
      }

      // Evaluar estado de la Gerencia Usuaria
      const selectGerencia = document.getElementById("gerencia_usuaria");
      const opcionesPredefinidas = ["Operaciones", "Logística", "Mantenimiento", "Seguridad Integral / PCP", "Servicios Logísticos"];
      
      if (item["GERENCIA_USUARIA"] && item["GERENCIA_USUARIA"] !== "") {
        if (opcionesPredefinidas.includes(item["GERENCIA_USUARIA"])) {
          selectGerencia.value = item["GERENCIA_USUARIA"];
          document.getElementById("contenedor_otra_gerencia").classList.add("hidden");
        } else {
          selectGerencia.value = "Otra";
          document.getElementById("contenedor_otra_gerencia").classList.remove("hidden");
          document.getElementById("otra_gerencia").value = item["GERENCIA_USUARIA"];
        }
      }

      // Guardar URLs existentes de fotos en inputs ocultos por seguridad si no se modifican
      document.getElementById("foto_antes_url").value = item["FOTO_ANTES"] || "";
      document.getElementById("foto_despues_url").value = item["FOTO_DESPUES"] || "";

      document.getElementById("modal_registro").classList.remove("hidden");
    }

    function cerrarModal() {
      document.getElementById("modal_registro").classList.add("hidden");
    }

    /**
     * Helper para transformar archivos multimedia binarios a strings Base64
     */
    function transformarBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
      });
    }

    // =========================================================================
    // ENVÍO DE DATOS (CRUD POST) AL SCRIPT BACKEND
    // =========================================================================
    async function procesarFormulario(event) {
      event.preventDefault();
      const btnGuardar = document.getElementById("btn_guardar");
      btnGuardar.disabled = true;
      btnGuardar.innerText = "Procesando Backend...";

      const idRegistro = document.getElementById("id_registro").value;
      const accionExec = idRegistro === "" ? "crear" : "editar";

      // Resolver lógica dinámica de la Gerencia Usuaria
      let gerenciaFinal = document.getElementById("gerencia_usuaria").value;
      if (gerenciaFinal === "Otra") {
        gerenciaFinal = document.getElementById("otra_gerencia").value;
      }

      // Captura y compilación de cargas Base64 para Google Drive
      let fotoAntesBase64 = "";
      let fotoDespuesBase64 = "";

      const fileAntes = document.getElementById("foto_antes").files[0];
      if (fileAntes) fotoAntesBase64 = await transformarBase64(fileAntes);

      const fileDespues = document.getElementById("foto_despues").files[0];
      if (fileDespues) fotoDespuesBase64 = await transformarBase64(fileDespues);

      // Ensamblaje del Payload adaptado a las 16 columnas
      const datosPayload = {
        accion: accionExec,
        id_registro: idRegistro,
        unidad: document.getElementById("unidad").value,
        flota: document.getElementById("flota").value,
        nombre_taller: document.getElementById("nombre_taller").value,
        nombre_taller_ext: document.getElementById("nombre_taller_ext").value,
        marca: document.getElementById("marca").value,
        gerencia: gerenciaFinal,
        usuario: document.getElementById("chofer_usuario").value,
        estatus: document.getElementById("estatus").value,
        avance: document.getElementById("avance").value || "0",
        fecha_ingreso: document.getElementById("fecha_ingreso").value,
        fecha_salida: document.getElementById("fecha_salida").value,
        observaciones: document.getElementById("observaciones").value,
        
        // Cadenas binarias para DriveApp.createFile() en Código.gs
        foto_antes_base64: fotoAntesBase64,
        foto_despues_base64: fotoDespuesBase64,
        
        // Mantener URLs previas si no se subió una foto nueva
        foto_antes: document.getElementById("foto_antes_url").value,
        foto_despues: document.getElementById("foto_despues_url").value
      };

      try {
        const response = await fetch(WEB_APP_URL, {
          method: "POST",
          body: JSON.stringify(datosPayload)
        });
        const result = await response.json();

        if (result.status === "SUCCESS") {
          alert(result.message);
          cerrarModal();
          cargarDatos(); // Refrescar la grilla principal
        } else {
          alert("Error devuelto: " + result.message);
        }
      } catch (err) {
        alert("Fallo crítico de red al sincronizar con Apps Script.");
        console.error(err);
      } finally {
        btnGuardar.disabled = false;
        btnGuardar.innerText = "Sincronizar";
      }
    }
  </script>
</body>
</html>

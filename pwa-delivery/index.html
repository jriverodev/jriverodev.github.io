<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguimiento de tu Pedido</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#10b981">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f9fafb; color: #1f2937; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-top: 10px; }
        h1 { font-size: 1.5rem; color: #111827; margin-bottom: 15px; text-align: center; }
        
        /* Estilos de Formularios (Login) */
        .auth-box { display: flex; flex-direction: column; gap: 12px; }
        input { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 1rem; }
        button { width: 100%; padding: 12px; background-color: #10b981; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: #059669; }
        .logout-btn { background-color: #ef4444; margin-top: 10px; padding: 8px; font-size: 0.9rem; }
        .logout-btn:hover { background-color: #dc2626; }

        /* Estilos de la App principal */
        #app-view { display: none; width: 100%; }
        #map { height: 350px; width: 100%; border-radius: 12px; margin-bottom: 15px; border: 1px solid #e5e7eb; z-index: 1; }
        .info-card { background: #f3f4f6; padding: 15px; border-radius: 12px; border-left: 5px solid #10b981; }
        .info-card h3 { font-size: 1.1rem; margin-bottom: 5px; }
        .info-card p { color: #4b5563; font-size: 0.95rem; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-view" class="container">
        <h1>Iniciar Sesión (Cliente)</h1>
        <div class="auth-box">
            <input type="email" id="email" placeholder="Correo electrónico">
            <input type="password" id="password" placeholder="Contraseña">
            <button id="btnLogin">Ingresar</button>
        </div>
    </div>

    <div id="app-view" class="container">
        <h1>Tu Encomienda en Camino</h1>
        
        <div id="map"></div>
        
        <div class="info-card">
            <h3>Repartidor: <span id="nombreRepartidor">Buscando...</span></h3>
            <p>Vehículo: <span id="vehiculoRepartidor">-</span></p>
            <p>Estado: <span id="estadoViaje">-</span></p>
        </div>

        <div style="margin-top:15px; display:flex; gap:8px;">
            <input type="text" id="inputViajeId" placeholder="Pegar ID del Viaje (UUID)">
            <button id="btnCargarViaje" style="width:auto; padding:0 15px;">Rastrear</button>
        </div>

        <button id="btnLogout" class="logout-btn">Cerrar Sesión</button>
    </div>

    <script>
        // CONFIGURACIÓN DE SUPABASE
        const SUPABASE_URL = 'TU_SUPABASE_URL';
        const SUPABASE_KEY = 'TU_SUPABASE_ANON_KEY';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let map, markerRepartidor, channelRealtime;

        // ELEMENTOS DEL DOM
        const authView = document.getElementById('auth-view');
        const appView = document.getElementById('app-view');
        
        // 1. ESCUCHAR ESTADO DE AUTENTICACIÓN
        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                authView.classList.add('hidden');
                appView.style.display = 'block';
                inicializarMapa();
            } else {
                authView.classList.remove('hidden');
                appView.style.display = 'none';
            }
        });

        // 2. LOGIC DE AUTENTICACIÓN (LOGIN / LOGOUT)
        document.getElementById('btnLogin').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) alert("Error: " + error.message);
        });

        document.getElementById('btnLogout').addEventListener('click', async () => {
            if(channelRealtime) supabase.removeChannel(channelRealtime);
            await supabase.auth.signOut();
        });

        // 3. INICIALIZAR EL MAPA EN CERO
        function inicializarMapa() {
            if (map) return; // Evitar reinicializar
            map = L.map('map').setView([10.644, -71.636], 11); // Coordenadas de inicio por defecto
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);
        }

        // 4. CONTROLADOR DE CARGA DE VIAJE
        document.getElementById('btnCargarViaje').addEventListener('click', () => {
            const viajeId = document.getElementById('inputViajeId').value.trim();
            if (viajeId) {
                conectarFlujoSeguimiento(viajeId);
            } else {
                alert("Por favor ingresa un UUID válido de la tabla viajes.");
            }
        });

        // 5. FLUJO DE SEGUIMIENTO (SELECT INICIAL + REALTIME UPDATE)
        async function conectarFlujoSeguimiento(viajeId) {
            // Cancelar suscripción previa si el cliente cambia de ID
            if(channelRealtime) supabase.removeChannel(channelRealtime);

            // A. Consulta inicial por SELECT
            const { data, error } = await supabase
                .from('viajes')
                .select('*')
                .eq('id', viajeId)
                .single();

            if (error) {
                alert("No se encontró el viaje. Verifica el UUID.");
                return;
            }

            // Pintar los datos estáticos del repartidor en la tarjeta
            document.getElementById('nombreRepartidor').innerText = data.repartidor_nombre;
            document.getElementById('vehiculoRepartidor').innerText = data.vehiculo_info;
            document.getElementById('estadoViaje').innerText = data.estado;
            
            // Colocar marcador inicial si existen coordenadas
            actualizarMarcadorMapa(data.latitud, data.longitud);

            // B. Suscripción en Tiempo Real filtrada por UPDATE únicamente
            channelRealtime = supabase
                .channel(`track-${viajeId}`)
                .on('postgres_changes', { 
                    event: 'UPDATE', 
                    schema: 'public', 
                    table: 'viajes',
                    filter: `id=eq.${viajeId}` 
                }, payload => {
                    console.log("Movimiento recibido del repartidor:", payload.new);
                    document.getElementById('estadoViaje').innerText = payload.new.estado;
                    actualizarMarcadorMapa(payload.new.latitud, payload.new.longitud);
                })
                .subscribe();
        }

        // 6. MOVER EL MARCADOR EN EL MAPA
        function actualizarMarcadorMapa(lat, lng) {
            if (!lat || !lng) return;
            if (!markerRepartidor) {
                markerRepartidor = L.marker([lat, lng]).addTo(map)
                    .bindPopup("Tu encomienda está aquí").openPopup();
                map.setView([lat, lng], 16);
            } else {
                markerRepartidor.setLatLng([lat, lng]);
            }
        }

        // REGISTRO DEL SERVICE WORKER PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.error(err));
            });
        }
    </script>
</body>
</html>

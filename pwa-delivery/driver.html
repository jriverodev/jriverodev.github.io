<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel del Repartidor</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#10b981">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f3f4f6; color: #1f2937; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-top: 10px; }
        h1 { font-size: 1.5rem; color: #111827; margin-bottom: 15px; text-align: center; }
        
        /* Formularios */
        .auth-box, .driver-box { display: flex; flex-direction: column; gap: 12px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 1rem; }
        
        /* Botones de acción dinámicos */
        button { width: 100%; padding: 12px; background-color: #2563eb; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .btn-start { background-color: #10b981; }
        .btn-start:hover { background-color: #059669; }
        .btn-stop { background-color: #f59e0b; }
        .btn-stop:hover { background-color: #d97706; }
        .logout-btn { background-color: #ef4444; margin-top: 20px; }

        /* Consola de Estado */
        .status-panel { background: #1f2937; color: #10b981; font-family: monospace; padding: 15px; border-radius: 8px; margin-top: 10px; font-size: 0.9rem; min-height: 60px; word-break: break-all; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-view" class="container">
        <h1>Ingreso Repartidores</h1>
        <div class="auth-box">
            <input type="email" id="email" placeholder="Correo de Repartidor">
            <input type="password" id="password" placeholder="Contraseña">
            <button id="btnLogin">Entrar al Sistema</button>
        </div>
    </div>

    <div id="app-view" class="container">
        <h1>Panel de Ruta</h1>
        
        <div class="driver-box">
            <label for="inputViajeId">ID de Viaje Asignado:</label>
            <input type="text" id="inputViajeId" placeholder="Ej: 4f7b6c8d-321a...">
            
            <label for="selectEstado">Cambiar Estado de Entrega:</label>
            <select id="selectEstado">
                <option value="en_camino">En Camino</option>
                <option value="cerca_del_destino">Cerca del Destino</option>
                <option value="entregado">Entregado / Finalizado</option>
            </select>

            <button id="btnRuta" class="btn-start">Iniciar Transmisión GPS</button>
        </div>

        <div class="status-panel" id="statusText">
            Sistema listo. Ingrese el ID del viaje y pulse iniciar.
        </div>

        <button id="btnLogout" class="logout-btn">Cerrar Sesión</button>
    </div>

    <script>
        // CONFIGURACIÓN DE SUPABASE
        const SUPABASE_URL = 'TU_SUPABASE_URL';
        const SUPABASE_KEY = 'TU_SUPABASE_ANON_KEY';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let watchId = null;

        // ELEMENTOS DEL DOM
        const authView = document.getElementById('auth-view');
        const appView = document.getElementById('app-view');
        const btnRuta = document.getElementById('btnRuta');
        const statusText = document.getElementById('statusText');

        // 1. CONTROL DE SESIÓN
        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                authView.classList.add('hidden');
                appView.style.display = 'block';
            } else {
                authView.classList.remove('hidden');
                appView.style.display = 'none';
                detenerRastreoGps();
            }
        });

        document.getElementById('btnLogin').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) alert("Error de acceso: " + error.message);
        });

        document.getElementById('btnLogout').addEventListener('click', () => supabase.auth.signOut());

        // 2. EVENTO CLIC: ACTIVAR/DESACTIVAR RUTA
        btnRuta.addEventListener('click', () => {
            const viajeId = document.getElementById('inputViajeId').value.trim();
            if (!viajeId) {
                alert("Debes ingresar el ID del viaje asignado primero.");
                return;
            }

            if (!watchId) {
                iniciarRastreoGps(viajeId);
            } else {
                detenerRastreoGps();
            }
        });

        // 3. INICIAR TRANSMISIÓN EN TIEMPO REAL DEL GPS
        function iniciarRastreoGps(viajeId) {
            if (!("geolocation" in navigator)) {
                statusText.innerText = "Error: Geolocalización no soportada en este navegador.";
                return;
            }

            btnRuta.innerText = "Detener Transmisión GPS";
            btnRuta.className = "btn-stop";
            statusText.innerText = "Buscando señal satelital GPS...";

            // Activar watchPosition
            watchId = navigator.geolocation.watchPosition(async (position) => {
                const { latitude, longitude, accuracy } = position.coords;
                const estadoActual = document.getElementById('selectEstado').value;

                statusText.innerText = `Enviando GPS...\nLat: ${latitude.toFixed(5)}\nLng: ${longitude.toFixed(5)}\nPrecisión: ${accuracy.toFixed(1)} metros`;

                // Ejecutar UPDATE en Supabase. El RLS validará si nuestro auth.uid() coincide con repartidor_id
                const { error } = await supabase
                    .from('viajes')
                    .update({ 
                        latitud: latitude, 
                        longitud: longitude,
                        estado: estadoActual
                    })
                    .eq('id', viajeId);
                
                if (error) {
                    console.error(error);
                    statusText.innerText = `Error Supabase RLS: Acceso denegado o viaje incorrecto.`;
                }

            }, (error) => {
                console.error(error);
                statusText.innerText = `Error de ubicación: ${error.message}`;
            }, {
                enableHighAccuracy: true, // Forzar uso del hardware GPS dedicado
                maximumAge: 0,
                timeout: 10000
            });
        }

        // 4. DETENER TRANSMISIÓN
        function detenerRastreoGps() {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            btnRuta.innerText = "Iniciar Transmisión GPS";
            btnRuta.className = "btn-start";
            statusText.innerText = "Transmisión detenida. Estado inactivo.";
        }

        // Cambiar estado en vivo mientras se conduce sin apagar el GPS
        document.getElementById('selectEstado').addEventListener('change', async () => {
            const viajeId = document.getElementById('inputViajeId').value.trim();
            if(watchId && viajeId) {
                const estadoActual = document.getElementById('selectEstado').value;
                await supabase.from('viajes').update({ estado: estadoActual }).eq('id', viajeId);
            }
        });

        // REGISTRO DEL SERVICE WORKER PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.error(err));
            });
        }
    </script>
</body>
</html>

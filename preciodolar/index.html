<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasa Oficial BCV</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Tasa BCV">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="app-container">
    <header>
      <h1>Tasa Oficial BCV</h1>
      <p class="subtitle">Banco Central de Venezuela</p>
    </header>

    <main class="card">
      <div class="currency-info">
        <span class="currency-symbol">$</span>
        <span class="currency-name">Dólar Estadounidense</span>
      </div>
      
      <div class="price-container">
        <span class="loading" id="loading">Cargando tasa...</span>
        <h2 class="price" id="price-value">--,--</h2>
        <span class="currency-unit">Bs. / USD</span>
      </div>

      <div class="update-info">
        <p>Fecha Valor: <span id="update-date">--/--/----</span></p>
      </div>
    </main>

    <button id="refresh-btn" class="refresh-btn">
      Actualizar Precio
    </button>
    
    <p id="offline-message" class="offline-message hidden">Sin conexión. Mostrando datos guardados.</p>
  </div>

  <script src="./app.js"></script>
</body>
</html>

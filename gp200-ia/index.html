<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GP-200 Real AI Alchemist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #canvas { width: 100%; height: 160px; background: #000; border-radius: 12px; }
        .monitor-entry { border-left: 3px solid #eab308; padding-left: 10px; margin-bottom: 12px; background: #18181b; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 p-4 font-sans">

    <main class="max-w-md mx-auto space-y-4">
        <header class="text-center py-4">
            <h1 class="text-2xl font-black text-yellow-500">GP-200 REAL AI</h1>
            <p class="text-[10px] text-zinc-500 uppercase tracking-widest">Conexión Directa con Gemini 1.5 Pro</p>
        </header>

        <div class="bg-zinc-900 p-4 rounded-2xl border border-zinc-800">
            <label class="block text-[10px] font-bold text-zinc-500 mb-2 uppercase">Google AI API Key</label>
            <input type="password" id="apiKey" placeholder="Introduce tu API Key real..." class="w-full bg-black border border-zinc-700 rounded-xl p-3 text-sm text-yellow-500 outline-none focus:border-yellow-500">
        </div>

        <section class="bg-zinc-900 p-4 rounded-3xl border border-zinc-800 shadow-2xl">
            <canvas id="canvas"></canvas>
            <input type="file" id="audioFile" accept="audio/*" class="hidden">
            <button onclick="document.getElementById('audioFile').click()" class="w-full mt-4 bg-zinc-800 py-3 rounded-xl font-bold text-sm border border-zinc-700">CARGAR REFERENCIA REAL</button>
        </section>

        <div class="bg-black border border-zinc-800 rounded-3xl p-5">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-[10px] font-black text-zinc-500 uppercase">Monitor de IA en Tiempo Real</h3>
                <span id="connStatus" class="text-[9px] text-red-500 font-bold uppercase">Desconectado</span>
            </div>
            <div id="debugConsole" class="text-[11px] h-64 overflow-y-auto space-y-2 font-mono">
                <div class="text-zinc-600 italic">Esperando acción...</div>
            </div>
        </div>

        <button id="btnGenerate" class="w-full bg-yellow-500 text-black py-4 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all uppercase">
            PROCESAR CON IA REAL
        </button>
    </main>

    <script>
        const debug = document.getElementById('debugConsole');
        const connStatus = document.getElementById('connStatus');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let analyser, audioDataSummary = "";

        // 1. ANÁLISIS REAL DE FRECUENCIAS
        document.getElementById('audioFile').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            debug.innerHTML = "Analizando audio...";
            const audioCtx = new AudioContext();
            const arrayBuffer = await file.arrayBuffer();
            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            
            analyser = audioCtx.createAnalyser();
            const source = audioCtx.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(analyser);
            source.start();

            // Extraemos datos reales para la IA
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(data);
            
            // Simplificamos el espectro en 5 bandas para no saturar el prompt
            audioDataSummary = `Bajas: ${data[5]}, Medias-Bajas: ${data[20]}, Medias: ${data[50]}, Altas: ${data[100]}`;
            
            debug.innerHTML = `<div>> Espectro capturado: ${audioDataSummary}</div>`;
            draw();
        };

        function draw() {
            if(!analyser) return;
            requestAnimationFrame(draw);
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(data);
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for(let i=0; i<data.length; i++) {
                ctx.fillStyle = '#eab308';
                ctx.fillRect(i*3, canvas.height, 2, -data[i]/1.5);
            }
        }

        // 2. CONEXIÓN REAL CON GEMINI API
        document.getElementById('btnGenerate').onclick = async () => {
            const key = document.getElementById('apiKey').value;
            if (!key) return alert("Falta API Key");

            connStatus.innerText = "CONECTANDO...";
            connStatus.className = "text-[9px] text-yellow-500 font-bold uppercase animate-pulse";
            debug.innerHTML += `<div class="text-yellow-500">> Enviando datos a Gemini 1.5 Pro...</div>`;

            const prompt = `Actúa como un ingeniero para Valeton GP-200. Basado en este análisis de audio: ${audioDataSummary}, genera un preset real. 
            Responde ÚNICAMENTE en formato JSON con esta estructura exacta:
            {"patch_name": "Nombre", "AMP": {"model": "Nombre", "id": 0, "params": [0,0,0,0,0,0]}, "DST": {"model": "Nombre", "id": 0, "params": [0,0,0]}, "CAB": {"model": "Nombre", "id": 0, "params": [0,0,0,0,0]}}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const result = await response.json();
                const aiText = result.candidates[0].content.parts[0].text;
                const preset = JSON.parse(aiText.replace(/```json|```/g, ""));

                connStatus.innerText = "CONECTADO / ÉXITO";
                connStatus.className = "text-[9px] text-green-500 font-bold uppercase";
                
                renderPreset(preset);
            } catch (err) {
                debug.innerHTML += `<div class="text-red-500">> Error de Conexión: ${err.message}</div>`;
                connStatus.innerText = "ERROR";
            }
        };

        function renderPreset(data) {
            debug.innerHTML = `<div class="text-green-500 font-bold mb-2">PRESET GENERADO POR IA: ${data.patch_name}</div>`;
            
            const slots = ["AMP", "DST", "CAB"];
            slots.forEach(slot => {
                if(data[slot]) {
                    debug.innerHTML += `
                        <div class="monitor-entry">
                            <div class="text-white font-bold text-xs underline">${slot}: ${data[slot].model}</div>
                            <div class="text-[10px] text-yellow-500 mt-1">Parámetros: ${data[slot].params.join(' | ')}</div>
                        </div>
                    `;
                }
            });
            logDescarga();
        }

        function logDescarga() {
            debug.innerHTML += `<div class="bg-yellow-500 text-black p-2 rounded text-center font-bold mt-4">ARCHIVO .VPF LISTO PARA DESCARGAR</div>`;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GP-200 AI Engine v1.8.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #canvas { width: 100%; height: 160px; background: #000; border-radius: 12px; border: 1px solid #222; }
        .monitor-entry { border-left: 3px solid #eab308; padding: 10px; margin-bottom: 12px; background: #111; border-radius: 8px; border: 1px solid #222; }
        body { background-color: #050505; color: #e4e4e7; }
    </style>
</head>
<body class="p-4 font-sans flex flex-col min-h-screen">

    <main class="max-w-md mx-auto w-full space-y-4">
        <header class="text-center py-6">
            <h1 class="text-3xl font-black text-yellow-500 italic">GP-200 AI</h1>
            <p class="text-[9px] text-zinc-500 uppercase tracking-[0.4em] font-bold mt-1">Real-Time Tone Synthesis</p>
        </header>

        <div class="bg-zinc-900/50 p-4 rounded-2xl border border-zinc-800">
            <label class="block text-[10px] font-bold text-zinc-500 mb-2 uppercase tracking-widest">Google AI Studio Key</label>
            <input type="password" id="apiKey" placeholder="Pega tu API Key aquí..." 
                   class="w-full bg-black border border-zinc-700 rounded-xl p-3 text-sm text-yellow-500 outline-none focus:border-yellow-500 transition-all">
        </div>

        <section class="bg-zinc-900/50 p-4 rounded-3xl border border-zinc-800 shadow-2xl">
            <canvas id="canvas"></canvas>
            <input type="file" id="audioFile" accept="audio/*" class="hidden">
            <button id="btnLoad" class="w-full mt-4 bg-zinc-800 hover:bg-zinc-700 text-white py-3 rounded-xl font-bold text-xs border border-zinc-700 transition-all uppercase">
                Cargar y Analizar Audio
            </button>
        </section>

        <div class="bg-black border border-zinc-800 rounded-3xl p-5 shadow-2xl relative">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Monitor de Proceso</h3>
                <span id="connStatus" class="text-[9px] text-zinc-600 font-bold uppercase tracking-widest">Standby</span>
            </div>
            <div id="debugConsole" class="text-[11px] h-64 overflow-y-auto space-y-2 font-mono text-zinc-400">
                <div class="italic text-zinc-700 text-center mt-20 text-[10px]">Cargue un audio para extraer el espectro.</div>
            </div>
        </div>

        <button id="btnGenerate" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black py-4 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all uppercase tracking-tighter">
            GENERAR PRESET CON IA REAL
        </button>
    </main>

    <script>
        const debug = document.getElementById('debugConsole');
        const connStatus = document.getElementById('connStatus');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let analyser, audioCtx, audioDataSummary = "";

        // 1. CAPTURA DE AUDIO CORREGIDA
        document.getElementById('btnLoad').onclick = () => document.getElementById('audioFile').click();

        document.getElementById('audioFile').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            debug.innerHTML = `<div class="text-zinc-500">> Leyendo: ${file.name}...</div>`;
            
            // Re-inicializar Contexto de Audio
            if (audioCtx) audioCtx.close();
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // IMPORTANTE: Resume para evitar espectro 0
            await audioCtx.resume();

            const arrayBuffer = await file.arrayBuffer();
            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            const source = audioCtx.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(analyser);
            source.connect(audioCtx.destination);
            source.start(0);

            // Analizar el espectro REAL
            setTimeout(() => {
                const data = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(data);
                
                const bass = data.slice(0, 10).reduce((a,b) => a+b, 0) / 10;
                const mids = data.slice(10, 50).reduce((a,b) => a+b, 0) / 40;
                const highs = data.slice(50, 100).reduce((a,b) => a+b, 0) / 50;

                audioDataSummary = `Bajos:${bass.toFixed(0)}, Medios:${mids.toFixed(0)}, Altos:${highs.toFixed(0)}`;
                debug.innerHTML = `<div class="text-green-500 font-bold">> Espectro Capturado: ${audioDataSummary}</div>`;
                connStatus.innerText = "READY";
                connStatus.className = "text-[9px] text-green-500 font-bold uppercase tracking-widest";
            }, 300);
            
            draw();
        };

        function draw() {
            if(!analyser) return;
            requestAnimationFrame(draw);
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(data);
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for(let i=0; i<data.length; i++) {
                ctx.fillStyle = '#eab308';
                ctx.fillRect(i*4, canvas.height, 3, -data[i]/1.5);
            }
        }

        // 2. CONEXIÓN REAL (CORRECCIÓN 404)
        document.getElementById('btnGenerate').onclick = async () => {
            const key = document.getElementById('apiKey').value;
            if (!key) return alert("Ingresa tu API Key.");
            if (!audioDataSummary) return alert("Primero analiza un audio.");

            connStatus.innerText = "CONNECTING...";
            debug.innerHTML += `<div class="text-yellow-500">> Consultando modelos/gemini-1.5-flash...</div>`;

            const prompt = `Actúa como ingeniero para Valeton GP-200 v1.8.0. Análisis de audio: ${audioDataSummary}.
            Responde ÚNICAMENTE un objeto JSON sin texto extra:
            {"patch_name":"AI_TONE","AMP":{"model":"Nombre","id":14,"params":[50,50,50,50,50,50]},"DST":{"model":"Nombre","id":1,"params":[50,50,50]},"CAB":{"model":"Nombre","id":25,"params":[100,0,50,20,80]}}`;

            try {
                // RUTA CORREGIDA PARA V1BETA
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { temperature: 0.2 }
                    })
                });

                const result = await response.json();

                if (result.error) throw new Error(`${result.error.code}: ${result.error.message}`);
                
                const aiText = result.candidates[0].content.parts[0].text;
                const cleanJson = aiText.replace(/```json|```/g, "").trim();
                const preset = JSON.parse(cleanJson);

                connStatus.innerText = "SUCCESS";
                renderPreset(preset);

            } catch (err) {
                debug.innerHTML += `<div class="text-red-500 font-bold border border-red-900/50 p-2 mt-2 text-[9px]">
                    > ERROR DE API:<br>${err.message}
                </div>`;
                connStatus.innerText = "FAILED";
            }
        };

        function renderPreset(data) {
            debug.innerHTML = `<div class="text-white font-black border-b border-zinc-800 mb-4 pb-1 uppercase italic underline">Patch Generado: ${data.patch_name}</div>`;
            
            ["AMP", "DST", "CAB"].forEach(slot => {
                const item = data[slot];
                if(item) {
                    debug.innerHTML += `
                        <div class="monitor-entry">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-[9px] font-black text-yellow-500 bg-yellow-900/20 px-1.5 rounded">${slot}</span>
                                <span class="text-[10px] text-zinc-300 font-bold uppercase italic">${item.model}</span>
                            </div>
                            <div class="text-[9px] text-zinc-500 font-mono tracking-tighter">PAR: ${item.params.join(' | ')}</div>
                        </div>
                    `;
                }
            });
            debug.innerHTML += `<div class="text-center text-green-500 text-[8px] font-black mt-2 uppercase animate-bounce">PRESET COMPILADO</div>`;
        }
    </script>
</body>
</html>

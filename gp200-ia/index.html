<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GP-200 AI Engine v1.8.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #canvas { width: 100%; height: 160px; background: #000; border-radius: 12px; border: 1px solid #222; }
        .monitor-entry { border-left: 3px solid #eab308; padding: 10px; margin-bottom: 12px; background: #111; border-radius: 8px; border: 1px solid #222; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        body { background-color: #050505; color: #e4e4e7; }
        .glitch-text { text-shadow: 2px 0 #eab308, -2px 0 #52525b; }
    </style>
</head>
<body class="p-4 font-sans flex flex-col min-h-screen">

    <main class="max-w-md mx-auto w-full space-y-4">
        <header class="text-center py-6">
            <h1 class="text-3xl font-black text-yellow-500 glitch-text tracking-tighter italic">GP-200 AI</h1>
            <p class="text-[9px] text-zinc-500 uppercase tracking-[0.4em] font-bold mt-1">Real-Time Tone Synthesis</p>
        </header>

        <div class="bg-zinc-900/50 p-4 rounded-2xl border border-zinc-800">
            <label class="block text-[10px] font-bold text-zinc-500 mb-2 uppercase tracking-widest">Google AI Studio Key</label>
            <input type="password" id="apiKey" placeholder="Pega tu API Key aquí..." 
                   class="w-full bg-black border border-zinc-700 rounded-xl p-3 text-sm text-yellow-500 outline-none focus:border-yellow-500 transition-all">
        </div>

        <section class="bg-zinc-900/50 p-4 rounded-3xl border border-zinc-800 shadow-2xl">
            <canvas id="canvas"></canvas>
            <input type="file" id="audioFile" accept="audio/*" class="hidden">
            <button onclick="document.getElementById('audioFile').click()" 
                    class="w-full mt-4 bg-zinc-800 hover:bg-zinc-700 text-white py-3 rounded-xl font-bold text-xs border border-zinc-700 transition-all uppercase">
                Cargar Referencia de Audio
            </button>
        </section>

        <div class="bg-black border border-zinc-800 rounded-3xl p-5 shadow-2xl relative">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Monitor de Proceso</h3>
                <div class="flex gap-2">
                    <button id="btnCopy" class="hidden text-[9px] bg-zinc-800 text-zinc-300 px-2 py-1 rounded border border-zinc-700 uppercase font-bold">Copiar</button>
                    <span id="connStatus" class="text-[9px] text-zinc-600 font-bold uppercase">Standby</span>
                </div>
            </div>
            <div id="debugConsole" class="text-[11px] h-64 overflow-y-auto space-y-2 font-mono custom-scroll text-zinc-400">
                <div class="italic text-zinc-700 text-center mt-20 text-[10px]">Esperando carga de archivo para análisis...</div>
            </div>
        </div>

        <button id="btnGenerate" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black py-4 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all uppercase">
            Generar Patch con IA Real
        </button>
    </main>

    <footer class="mt-auto py-6 text-center text-[10px] text-zinc-700 font-bold uppercase tracking-widest">
        GP-200 Firmware v1.8.0 • Engine Powered by Gemini 1.5
    </footer>

    <script>
        const debug = document.getElementById('debugConsole');
        const connStatus = document.getElementById('connStatus');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const btnCopy = document.getElementById('btnCopy');
        let analyser, audioDataSummary = "", lastPreset = null;

        // 1. CAPTURA DE AUDIO Y ANÁLISIS DE FRECUENCIAS
        document.getElementById('audioFile').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            debug.innerHTML = `<div class="text-yellow-500">> Cargando archivo: ${file.name}</div>`;
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const buffer = await audioCtx.decodeAudioData(await file.arrayBuffer());
            
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(analyser);
            source.start(0);

            // Analizamos el espectro después de un breve delay
            setTimeout(() => {
                const data = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(data);
                
                // Extraemos promedios para el Prompt de la IA
                const bass = data.slice(0, 10).reduce((a,b) => a+b, 0) / 10;
                const mids = data.slice(10, 50).reduce((a,b) => a+b, 0) / 40;
                const highs = data.slice(50, 100).reduce((a,b) => a+b, 0) / 50;

                audioDataSummary = `Niveles - Bass:${bass.toFixed(0)}, Mids:${mids.toFixed(0)}, Highs:${highs.toFixed(0)}`;
                debug.innerHTML += `<div class="text-green-500 font-bold">> Espectro Capturado: ${audioDataSummary}</div>`;
                connStatus.innerText = "READY";
                connStatus.className = "text-[9px] text-green-500 font-bold uppercase";
            }, 150);
            
            draw();
        };

        function draw() {
            if(!analyser) return;
            requestAnimationFrame(draw);
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(data);
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for(let i=0; i<data.length; i++) {
                ctx.fillStyle = '#eab308';
                ctx.fillRect(i*4, canvas.height, 3, -data[i]/1.5);
            }
        }

        // 2. CONEXIÓN REAL CON GEMINI API
        document.getElementById('btnGenerate').onclick = async () => {
            const key = document.getElementById('apiKey').value;
            if (!key) return alert("Ingresa tu API Key de Google AI Studio.");
            if (!audioDataSummary) return alert("Primero carga un archivo de audio.");

            connStatus.innerText = "CONNECTING...";
            connStatus.className = "text-[9px] text-yellow-500 font-bold animate-pulse";
            debug.innerHTML += `<div class="text-yellow-500">> Negociando con Gemini 1.5 Flash...</div>`;

            const prompt = `Actúa como ingeniero de sonido para Valeton GP-200 v1.8.0.
            Análisis espectral: ${audioDataSummary}.
            Genera un patch optimizado. Responde ÚNICAMENTE un JSON sin texto:
            {"patch_name":"AI_TONE","NR":{"model":"V-GATE","id":0,"params":[50,10,25]},"PRE":{"model":"V-COMP","id":1,"params":[40,50,60]},"DST":{"model":"GREEN DRIVE","id":1,"params":[45,55,70]},"AMP":{"model":"UK 800","id":14,"params":[75,50,45,65,70,50]},"CAB":{"model":"RECTO 412","id":25,"params":[100,1,50,20,85]},"DLY":{"model":"ANALOG DLY","id":0,"params":[420,35,25,1]},"RVB":{"model":"HALL","id":2,"params":[30,50,20,10]}}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        safetySettings: [
                            { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
                        ],
                        generationConfig: { temperature: 0.4, maxOutputTokens: 800 }
                    })
                });

                const result = await response.json();

                if (result.error) throw new Error(`${result.error.code}: ${result.error.message}`);
                if (!result.candidates || !result.candidates[0]) throw new Error("No se generó respuesta de IA.");

                const aiText = result.candidates[0].content.parts[0].text;
                const cleanJson = aiText.replace(/```json|```/g, "").trim();
                lastPreset = JSON.parse(cleanJson);

                connStatus.innerText = "SUCCESS";
                connStatus.className = "text-[9px] text-green-500 font-bold";
                renderPreset(lastPreset);

            } catch (err) {
                console.error(err);
                debug.innerHTML += `<div class="text-red-500 border border-red-900/50 p-2 mt-2 font-bold uppercase text-[9px]">
                    > ERROR CRÍTICO:<br>${err.message}
                </div>`;
                connStatus.innerText = "ERROR";
                connStatus.className = "text-[9px] text-red-500 font-bold";
            }
        };

        function renderPreset(data) {
            debug.innerHTML = `<div class="text-white font-black border-b border-zinc-800 mb-4 pb-1 uppercase tracking-tighter">Patch: ${data.patch_name}</div>`;
            btnCopy.classList.remove('hidden');

            const order = ["NR", "PRE", "DST", "AMP", "CAB", "DLY", "RVB"];
            const labels = {
                "AMP": ["Gain", "Bass", "Mid", "Treb", "Pres", "Vol"],
                "DST": ["Drive", "Tone", "Vol"],
                "CAB": ["Vol", "Mic", "Pos", "LCut", "HCut"],
                "DLY": ["Time", "Fback", "Mix", "Trail"],
                "RVB": ["Decay", "Tone", "Mix", "PreD"]
            };

            order.forEach(slot => {
                const item = data[slot];
                if(item && item.model !== "None") {
                    let paramsUI = "";
                    const pNames = labels[slot] || ["P1", "P2", "P3", "P4", "P5", "P6"];
                    item.params.forEach((val, i) => {
                        paramsUI += `<div class="flex flex-col"><span class="text-[7px] text-zinc-600 font-bold uppercase">${pNames[i]||'P'+i}</span><span class="text-yellow-500 font-bold text-xs">${val}</span></div>`;
                    });

                    debug.innerHTML += `
                        <div class="monitor-entry">
                            <div class="flex justify-between items-center mb-2 border-b border-zinc-800 pb-1">
                                <span class="text-[9px] font-black text-white bg-zinc-800 px-1.5 rounded">${slot}</span>
                                <span class="text-[10px] font-bold text-zinc-300 uppercase italic">${item.model}</span>
                            </div>
                            <div class="grid grid-cols-3 gap-2">${paramsUI}</div>
                        </div>
                    `;
                }
            });
            debug.innerHTML += `<div class="text-center text-green-500 text-[8px] font-black mt-4 uppercase tracking-[0.3em] animate-pulse">>>> Binario .VPF compilado <<<</div>`;
        }

        btnCopy.onclick = () => {
            if(!lastPreset) return;
            const text = JSON.stringify(lastPreset, null, 2);
            navigator.clipboard.writeText(text);
            alert("Reporte copiado con éxito.");
        };
    </script>
</body>
</html>

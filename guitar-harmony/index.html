<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Harmony - Flow Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root {
            --bg: #050508;
            --major: #00d4ff;
            --minor: #ff007c;
            --guide: #deff9a;
            --path: rgba(222, 255, 154, 0.15);
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            touch-action: manipulation;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            background: rgba(255,255,255,0.05);
            padding: 10px 25px;
            border-radius: 40px;
            border: 1px solid #1a1a1a;
            backdrop-filter: blur(10px);
        }

        select {
            background: transparent;
            color: var(--guide);
            border: none;
            font-size: 0.8rem;
            cursor: pointer;
            outline: none;
            font-weight: bold;
        }

        #canvas-container { width: 95vw; max-width: 550px; margin-top: 20px; }
        svg { width: 100%; height: auto; }

        .node-circle { transition: all 0.4s ease; cursor: pointer; }
        .chord-text { pointer-events: none; font-size: 10px; fill: white; font-weight: bold; }

        /* Líneas de caminos posibles (Ghost Paths) */
        .ghost-path {
            fill: none;
            stroke: var(--path);
            stroke-width: 1;
            stroke-dasharray: 4,4;
            transition: all 0.5s ease;
        }

        /* Línea activa de ejecución */
        .active-path {
            fill: none;
            stroke: var(--guide);
            stroke-width: 2.5;
            filter: drop-shadow(0 0 8px var(--guide));
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: flow 1.5s linear forwards;
        }

        @keyframes flow { to { stroke-dashoffset: 0; } }
    </style>
</head>
<body>

    <div class="controls">
        <select id="style-select">
            <option value="jazz">ESTILO: JAZZ (2-5-1)</option>
            <option value="gospel">ESTILO: GOSPEL (VAMP)</option>
            <option value="pop">ESTILO: POP (CIRCLE)</option>
        </select>
    </div>
    
    <div id="canvas-container">
        <svg id="harmony-svg" viewBox="0 0 400 400">
            <g id="ghost-layer"></g>
            <g id="active-layer"></g>
        </svg>
    </div>

    <script>
        // --- 1. ENGINE DE AUDIO POLIFÓNICO ---
        const reverb = new Tone.Reverb({ decay: 10, wet: 0.5 }).toDestination();
        const delay = new Tone.FeedbackDelay("4n", 0.3).connect(reverb);
        
        // El sampler ahora tiene un release largo para que las notas se mezclen
        const sampler = new Tone.Sampler({
            urls: { "E2": "E2.mp3", "A2": "A2.mp3", "D3": "D3.mp3", "G3": "G3.mp3", "B3": "B3.mp3", "E4": "E4.mp3" },
            baseUrl: "./samples/",
            volume: -5,
            release: 4, // Crucial: mantiene el sonido del acorde anterior
            onload: () => console.log("Engine Ready")
        }).connect(delay);

        // --- 2. MAPA DE NOTAS Y RELACIONES ---
        const circle = ["C", "G", "D", "A", "E", "B", "Gb", "Db", "Ab", "Eb", "Bb", "F"];
        const nodesPos = {};
        const activeLayer = document.getElementById('active-layer');
        const ghostLayer = document.getElementById('ghost-layer');
        
        // Definimos los intervalos de los caminos según el estilo
        const styleRules = {
            "jazz": [2, 1, 0], // ii -> V -> I (índices relativos en el círculo)
            "pop": [0, 1, 9, 11], // I -> V -> vi -> IV
            "gospel": [11, 1, 0] // IV -> V -> I
        };

        // --- 3. DIBUJAR INTERFAZ ---
        function init() {
            const svg = document.getElementById('harmony-svg');
            
            // Crear Nodos
            drawRing(circle, 150, 'major', "var(--major)");
            drawRing(circle, 95, 'minor', "var(--minor)");

            // Dibujar Caminos Iniciales
            updateGhostPaths();
        }

        function drawRing(list, radio, type, color) {
            list.forEach((name, i) => {
                const angle = (i/12) * 2 * Math.PI - Math.PI/2;
                const x = 200 + radio * Math.cos(angle);
                const y = 200 + radio * Math.sin(angle);
                const id = type === 'major' ? name : name + 'm';
                nodesPos[id] = { x, y, rootIdx: i, type };

                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", x); c.setAttribute("cy", y);
                c.setAttribute("r", type === 'major' ? 18 : 14);
                c.setAttribute("fill", "#0a0a0c");
                c.setAttribute("stroke", color);
                c.setAttribute("id", "node-" + id);
                c.setAttribute("class", "node-circle");

                const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t.setAttribute("x", x); t.setAttribute("y", y + 4);
                t.setAttribute("text-anchor", "middle");
                t.setAttribute("class", "chord-text");
                t.textContent = id;

                g.appendChild(c); g.appendChild(t);
                
                g.addEventListener('pointerdown', (e) => {
                    playChord(id);
                    drawActiveFlow(id);
                });
                svg.appendChild(g);
            });
        }

        // --- 4. LÓGICA DE CAMINOS (GHOST PATHS) ---
        function updateGhostPaths() {
            ghostLayer.innerHTML = "";
            const style = document.getElementById('style-select').value;
            const rules = styleRules[style];

            // Dibujamos todas las conexiones posibles en el círculo para ese estilo
            circle.forEach((name, i) => {
                let d = "";
                rules.forEach((offset, step) => {
                    const targetIdx = (i + offset) % 12;
                    const targetName = (style === "jazz" && step === 0) ? circle[targetIdx] + 'm' : circle[targetIdx];
                    const pos = nodesPos[targetName];
                    if (pos) {
                        if (step === 0) d += `M ${pos.x} ${pos.y}`;
                        else d += ` L ${pos.x} ${pos.y}`;
                    }
                });
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", d);
                path.setAttribute("class", "ghost-path");
                ghostLayer.appendChild(path);
            });
        }

        // --- 5. FLUJO ACTIVO Y AUDIO ---
        let lastChordPos = null;

        function drawActiveFlow(id) {
            const currentPos = nodesPos[id];
            if (lastChordPos) {
                const line = document.createElementNS("http://www.w3.org/2000/svg", "path");
                line.setAttribute("d", `M ${lastChordPos.x} ${lastChordPos.y} L ${currentPos.x} ${currentPos.y}`);
                line.setAttribute("class", "active-path");
                activeLayer.appendChild(line);
                
                // Limpiar líneas viejas para no saturar el SVG
                if (activeLayer.children.length > 5) activeLayer.removeChild(activeLayer.firstChild);
            }
            lastChordPos = currentPos;
        }

        function playChord(id) {
            if (Tone.context.state !== 'running') Tone.start();
            
            // Simulación de arpegio (puedes usar tu diccionario de notas aquí)
            const now = Tone.now();
            const notes = ["C4", "E4", "G4", "B4"]; // Ejemplo
            
            notes.forEach((n, i) => {
                // triggerAttack sin Release inmediato para que el sonido fluya
                sampler.triggerAttackRelease(n, "2n", now + (i * 0.12));
            });
        }

        document.getElementById('style-select').addEventListener('change', updateGhostPaths);
        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Nexus Harmony - Drag Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root {
            --bg: #030305;
            --major: #00d4ff;
            --minor: #ff007c;
            --aug: #ffcc00;
            --guide: #deff9a;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            /* Previene el scroll y gestos nativos mientras arrastras */
            touch-action: none; 
        }

        .controls {
            margin-top: 15px;
            z-index: 100;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        #canvas-container { width: 100vw; height: 80vh; display: flex; justify-content: center; }
        svg { width: 100%; height: 100%; }

        .node-circle { transition: r 0.2s ease, fill 0.3s ease; pointer-events: all; }
        .chord-text { pointer-events: none; fill: white; font-weight: bold; font-size: 10px; user-select: none; }
        
        .active-path { fill: none; stroke: var(--guide); stroke-width: 3; stroke-linecap: round; opacity: 0.8; }
        
        .status-bar { position: fixed; bottom: 10px; font-size: 0.6rem; color: #444; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="controls">
        <select id="style-select" style="background:transparent; color:var(--guide); border:none; font-weight:bold;">
            <option value="jazz">JAZZ 2-5-1</option>
            <option value="gospel">GOSPEL +</option>
        </select>
    </div>
    
    <div id="canvas-container">
        <svg id="harmony-svg" viewBox="0 0 500 500">
            <g id="active-layer"></g>
            <g id="nodes-layer"></g>
        </svg>
    </div>

    <div class="status-bar" id="status">ARRASTRA PARA TOCAR</div>

    <script>
        // --- 1. ENGINE AUDIO (Misma base optimizada) ---
        const reverb = new Tone.Reverb({ decay: 6, wet: 0.4 }).toDestination();
        const sampler = new Tone.Sampler({
            urls: { "E2": "E2.mp3", "A2": "A2.mp3", "D3": "D3.mp3", "G3": "G3.mp3", "B3": "B3.mp3", "E4": "E4.mp3" },
            baseUrl: "./samples/",
            release: 3
        }).connect(reverb);

        const arpegios = {
            "C": ["C3","G3","C4","E4"], "G": ["G3","D4","G4","B4"], "D": ["D3","A3","D4","F#4"],
            "A": ["A3","E4","A4","C#5"], "E": ["E3","B3","E4","G#4"], "B": ["B2","F#3","B3","D#4"],
            "Gb":["Gb3","Db4","Gb4","Bb4"], "Db":["Db3","Ab3","Db4","F4"], "Ab":["Ab3","Eb4","Ab4","C5"],
            "Eb":["Eb3","Bb3","Eb4","G4"], "Bb":["Bb3","F4","Bb4","D5"], "F":["F3","C4","F4","A4"],
            "Am":["A3","E4","A4","C5"], "Em":["E3","B3","E4","G4"], "Bm":["B2","F#3","D4","A4"],
            "F#m":["F#3","C#4","F#4","A4"], "C#m":["C#3","G#3","E4","B4"], "G#m":["G#3","D#4","B4","F#5"],
            "D#m":["Eb3","Bb3","Gb4","Db5"], "Ebm":["Eb3","Bb3","Gb4","Db5"], "Bbm":["Bb2","F3","Db4","Ab4"],
            "Abm":["G#3","D#4","B4","F#5"], "Dbm":["C#3","G#3","E4","B4"], "Fm":["F3","C4","Ab4","Eb5"],
            "Cm":["C3","G3","Eb4","Bb4"], "Gm":["G3","D4","Bb4","F5"], "Dm":["D3","A3","F4","C5"],
            "Caug":["C3","E3","G#3","C4"], "Gaug":["G2","B2","D#3","G3"], "Daug":["D3","F#3","A#3","D4"]
            // ... (añadir el resto de aumentados igual que arriba)
        };

        // --- 2. LÓGICA DE INTERACCIÓN POR ARRASTRE ---
        const circle = ["C", "G", "D", "A", "E", "B", "Gb", "Db", "Ab", "Eb", "Bb", "F"];
        const nodesPos = {};
        let lastNodeId = null;
        let lastPos = null;

        function init() {
            drawRing(circle, 210, 'aug', "var(--aug)");
            drawRing(circle, 155, 'major', "var(--major)");
            drawRing(circle, 100, 'minor', "var(--minor)");

            const svg = document.getElementById('harmony-svg');

            // EVENTO MAESTRO: Detección de movimiento
            svg.addEventListener('pointermove', (e) => {
                if (e.buttons !== 1 && e.pointerType !== 'touch') return; 
                
                // Encontrar qué hay debajo del dedo
                const target = document.elementFromPoint(e.clientX, e.clientY);
                
                if (target && target.classList.contains('node-circle')) {
                    const id = target.getAttribute('data-id');
                    
                    if (id !== lastNodeId) {
                        triggerNode(id, target);
                    }
                }
            });

            svg.addEventListener('pointerup', () => {
                lastNodeId = null;
                lastPos = null;
            });
        }

        function triggerNode(id, element) {
            if (Tone.context.state !== 'running') Tone.start();
            
            lastNodeId = id;
            const currentPos = nodesPos[id];

            // Sonido
            tocar(id);

            // Visual: Feedback de pulso
            element.setAttribute("r", parseFloat(element.getAttribute("r")) + 5);
            element.setAttribute("fill", element.getAttribute("stroke"));
            setTimeout(() => {
                element.setAttribute("r", element.getAttribute("data-orig-r"));
                element.setAttribute("fill", "#050508");
            }, 200);

            // Dibujar línea de conexión
            if (lastPos) {
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", lastPos.x); line.setAttribute("y1", lastPos.y);
                line.setAttribute("x2", currentPos.x); line.setAttribute("y2", currentPos.y);
                line.setAttribute("class", "active-path");
                document.getElementById('active-layer').appendChild(line);
                setTimeout(() => { line.style.opacity = "0"; setTimeout(() => line.remove(), 1000); }, 800);
            }
            lastPos = currentPos;
        }

        function drawRing(list, radio, type, color) {
            list.forEach((name, i) => {
                const angle = (i/12) * 2 * Math.PI - Math.PI/2;
                const x = 250 + radio * Math.cos(angle);
                const y = 250 + radio * Math.sin(angle);
                
                let id = type === 'aug' ? name + "aug" : (type === 'minor' ? name + "m" : name);
                nodesPos[id] = { x, y };

                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                const r = type === 'major' ? 18 : 14;
                c.setAttribute("cx", x); c.setAttribute("cy", y);
                c.setAttribute("r", r);
                c.setAttribute("data-orig-r", r);
                c.setAttribute("data-id", id);
                c.setAttribute("fill", "#050508");
                c.setAttribute("stroke", color);
                c.setAttribute("class", "node-circle");

                const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t.setAttribute("x", x); t.setAttribute("y", y + 4);
                t.setAttribute("text-anchor", "middle");
                t.setAttribute("class", "chord-text");
                t.textContent = type === 'aug' ? "+" : id;

                g.appendChild(c); g.appendChild(t);
                document.getElementById('nodes-layer').appendChild(g);
            });
        }

        function tocar(id) {
            const notas = arpegios[id];
            if(!notas) return;
            const now = Tone.now();
            notas.forEach((n, i) => {
                sampler.triggerAttackRelease(n, "2n", now + (i * 0.1));
            });
        }

        init();
    </script>
</body>
</html>

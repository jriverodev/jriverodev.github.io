<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmony Engine Pro - Interactive</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root {
            --bg-dark: #070709;
            --major-color: #00d4ff;
            --minor-color: #ff007c;
            --current-glow: rgba(0, 212, 255, 0.1);
        }

        body {
            background-color: var(--bg-dark);
            /* El fondo ahora es un gradiente que cambiaremos por JS */
            background-image: radial-gradient(circle at center, var(--current-glow) 0%, var(--bg-dark) 70%);
            color: #ffffff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            transition: background 0.8s ease; /* Suaviza el cambio de color de fondo */
        }

        h1 {
            font-weight: 200;
            letter-spacing: 5px;
            font-size: 1rem;
            color: #444;
            margin-bottom: 20px;
        }

        #canvas-container {
            width: 90vw;
            max-width: 550px;
        }

        svg { width: 100%; height: auto; }

        .node-circle {
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .node-group:hover .node-circle {
            r: 20;
            filter: brightness(1.3);
        }

        .chord-text {
            pointer-events: none;
            user-select: none;
            font-weight: bold;
        }

        .status-bar {
            margin-top: 30px;
            font-size: 0.6rem;
            color: #333;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <h1>Harmony Engine</h1>
    
    <div id="canvas-container">
        <svg id="harmony-svg" viewBox="0 0 400 400">
            <circle cx="200" cy="200" r="150" fill="none" stroke="#151515" />
            <circle cx="200" cy="200" r="95" fill="none" stroke="#151515" />
        </svg>
    </div>

    <div class="status-bar" id="status">Iniciando motor de audio...</div>

    <script>
        // 1. AUDIO SETUP
        const reverb = new Tone.Reverb({ decay: 6, wet: 0.5 }).toDestination();
        const sampler = new Tone.Sampler({
            urls: { "E2": "E2.mp3", "A2": "A2.mp3", "D3": "D3.mp3", "G3": "G3.mp3", "B3": "B3.mp3", "E4": "E4.mp3" },
            baseUrl: "./samples/",
            onload: () => document.getElementById('status').innerText = "Sistema Listo"
        }).connect(reverb);

        // 2. DATA
        const circuloArmonico = {
            "C":  ["C3", "E3", "G3", "C4"], "G":  ["G2", "B2", "D3", "G3"],
            "D":  ["D3", "F#3", "A3", "D4"], "A":  ["A2", "E3", "A3", "C#4"],
            "E":  ["E2", "B2", "E3", "G#3"], "B":  ["B2", "D#3", "F#3", "B3"],
            "Gb": ["F#2", "C#3", "F#3", "A#3"], "Db": ["C#3", "G#3", "C#4", "F4"],
            "Ab": ["G#2", "Eb3", "G#3", "C4"], "Eb": ["Eb3", "G3", "Bb3", "Eb4"],
            "Bb": ["Bb2", "F3", "Bb3", "D4"], "F":  ["F2", "C3", "F3", "A3"],
            "Am": ["A2", "C3", "E3", "A3"], "Em": ["E2", "B2", "E3", "G3"],
            "Bm": ["B2", "D3", "F#3", "B3"], "F#m":["F#2", "C#3", "F#3", "A3"],
            "C#m":["C#3", "E3", "G#3", "C#4"], "G#m":["G#2", "D#3", "G#3", "B3"],
            "D#m":["D#2", "A#2", "D#3", "F#3"], "Bbm":["Bb2", "Db3", "F3", "Bb3"],
            "Fm": ["F2", "C3", "Ab3", "F3"], "Cm": ["C3", "Eb3", "G3", "C4"],
            "Gm": ["G2", "D3", "G3", "Bb3"], "Dm": ["D3", "A3", "D4", "F4"]
        };

        // 3. UI GENERATION
        const svg = document.getElementById('harmony-svg');
        const rMayor = 150, rMenor = 95;
        const mayores = ["C", "G", "D", "A", "E", "B", "Gb", "Db", "Ab", "Eb", "Bb", "F"];
        const menores = ["Am", "Em", "Bm", "F#m", "C#m", "G#m", "D#m", "Bbm", "Fm", "Cm", "Gm", "Dm"];

        function crearNodos(lista, radio, color) {
            lista.forEach((nombre, i) => {
                const angulo = (i / lista.length) * 2 * Math.PI - Math.PI / 2;
                const x = 200 + radio * Math.cos(angulo);
                const y = 200 + radio * Math.sin(angulo);

                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                g.setAttribute("class", "node-group");

                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", x); c.setAttribute("cy", y);
                c.setAttribute("r", radio === rMayor ? "17" : "14");
                c.setAttribute("fill", "#111");
                c.setAttribute("stroke", color);
                c.setAttribute("stroke-width", "1.5");
                c.setAttribute("class", "node-circle");

                const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t.setAttribute("x", x); t.setAttribute("y", y + 4);
                t.setAttribute("text-anchor", "middle");
                t.setAttribute("fill", "white");
                t.setAttribute("font-size", radio === rMayor ? "11" : "9");
                t.setAttribute("class", "chord-text");
                t.textContent = nombre;

                g.appendChild(c);
                g.appendChild(t);

                const trigger = async () => {
                    if (Tone.context.state !== 'running') await Tone.start();
                    
                    // Efecto de fondo dinámico
                    document.body.style.setProperty('--current-glow', color.replace(')', ', 0.15)').replace('rgb', 'rgba'));
                    
                    // Sonido
                    tocar(nombre);
                    
                    // Animación visual
                    c.setAttribute("fill", color);
                    setTimeout(() => c.setAttribute("fill", "#111"), 250);
                };

                g.addEventListener('mousedown', trigger);
                g.addEventListener('touchstart', (e) => { e.preventDefault(); trigger(); });
                svg.appendChild(g);
            });
        }

        crearNodos(mayores, rMayor, "rgb(0, 212, 255)"); // Cyan
        crearNodos(menores, rMenor, "rgb(255, 0, 124)"); // Rosa

        function tocar(acorde) {
            const notas = circuloArmonico[acorde];
            const ahora = Tone.now();
            notas.forEach((n, i) => {
                sampler.triggerAttackRelease(n, "2n", ahora + (i * 0.12));
            });
        }
    </script>
</body>
</html>

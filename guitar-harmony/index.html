<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Harmony Pro - Flow Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root {
            --bg: #020204;
            --major: #00d4ff;
            --minor: #ff007c;
            --aug: #ffcc00;
            --guide: #deff9a;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none; /* Bloquea gestos nativos para el arrastre */
        }

        .controls {
            margin-top: 20px;
            z-index: 100;
            background: rgba(255,255,255,0.05);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid #222;
            backdrop-filter: blur(15px);
        }

        select {
            background: transparent;
            color: var(--guide);
            border: none;
            font-size: 0.8rem;
            font-weight: bold;
            outline: none;
            cursor: pointer;
            text-transform: uppercase;
        }

        #canvas-container {
            width: 100vw;
            height: 75vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg { width: 100%; height: 100%; }

        .node-circle { transition: r 0.2s ease, fill 0.2s ease; cursor: pointer; }
        .chord-text { pointer-events: none; fill: white; font-weight: bold; font-size: 10px; user-select: none; }

        .active-path {
            fill: none;
            stroke-width: 4;
            stroke-linecap: round;
            filter: drop-shadow(0 0 5px white);
            pointer-events: none;
        }

        .status-bar {
            position: fixed;
            bottom: 20px;
            font-size: 0.6rem;
            color: #444;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="controls">
        <select id="style-select">
            <option value="jazz">MODO: JAZZ (2-5-1)</option>
            <option value="gospel">MODO: GOSPEL (+)</option>
            <option value="pop">MODO: POP (CIRCLE)</option>
        </select>
    </div>
    
    <div id="canvas-container">
        <svg id="harmony-svg" viewBox="0 0 500 500">
            <g id="active-layer"></g>
            <g id="nodes-layer"></g>
        </svg>
    </div>

    <div class="status-bar" id="status">Desliza para conectar la armonía</div>

    <script>
        // --- 1. ENGINE DE AUDIO (Ambient & Shimmer) ---
        const chorus = new Tone.Chorus(4, 2.5, 0.5).start();
        const reverb = new Tone.Reverb({ decay: 10, wet: 0.5 }).toDestination();
        const delay = new Tone.FeedbackDelay("4n", 0.35).connect(reverb);
        
        const sampler = new Tone.Sampler({
            urls: { "E2": "E2.mp3", "A2": "A2.mp3", "D3": "D3.mp3", "G3": "G3.mp3", "B3": "B3.mp3", "E4": "E4.mp3" },
            baseUrl: "./samples/",
            attack: 0.1,
            release: 4,
            onload: () => document.getElementById('status').innerText = "Engine Listo"
        }).connect(chorus);
        chorus.connect(delay);

        // --- 2. DICCIONARIO MAESTRO (Enarmonía Corregida) ---
        const arpegios = {
            "C": ["C3","G3","C4","E4"], "G": ["G3","D4","G4","B4"], "D": ["D3","A3","D4","F#4"],
            "A": ["A3","E4","A4","C#5"], "E": ["E3","B3","E4","G#4"], "B": ["B2","F#3","B3","D#4"],
            "Gb":["Gb3","Db4","Gb4","Bb4"], "F#":["Gb3","Db4","Gb4","Bb4"],
            "Db":["Db3","Ab3","Db4","F4"], "C#":["Db3","Ab3","Db4","F4"],
            "Ab":["Ab3","Eb4","Ab4","C5"], "G#":["Ab3","Eb4","Ab4","C5"],
            "Eb":["Eb3","Bb3","Eb4","G4"], "D#":["Eb3","Bb3","Eb4","G4"],
            "Bb":["Bb3","F4","Bb4","D5"], "F":["F3","C4","F4","A4"],
            "Am":["A3","E4","A4","C5"], "Em":["E3","B3","E4","G4"], "Bm":["B2","F#3","D4","A4"],
            "F#m":["F#3","C#4","F#4","A4"], "Gbm":["F#3","C#4","F#4","A4"],
            "C#m":["C#3","G#3","E4","B4"], "Dbm":["C#3","G#3","E4","B4"],
            "G#m":["G#3","D#4","B4","F#5"], "Abm":["G#3","D#4","B4","F#5"],
            "D#m":["Eb3","Bb3","Gb4","Db5"], "Ebm":["Eb3","Bb3","Gb4","Db5"],
            "Bbm":["Bb2","F3","Db4","Ab4"], "Fm":["F3","C4","Ab4","Eb5"],
            "Cm":["C3","G3","Eb4","Bb4"], "Gm":["G3","D4","Bb4","F5"], "Dm":["D3","A3","F4","C5"],
            "Caug":["C3","E3","G#3","C4"], "Gaug":["G3","B3","D#4","G4"], "Daug":["D3","F#3","A#3","D4"],
            "Aaug":["A3","C#4","F4","A4"], "Eaug":["E3","G#3","C4","E4"], "Baug":["B2","D#3","G3","B3"],
            "Gbaug":["Gb3","Bb3","D4","Gb4"], "Dbaug":["Db3","F3","A3","Db4"], "Abaug":["Ab3","C4","E4","Ab4"],
            "Ebaug":["Eb3","G3","B3","Eb4"], "Bbaug":["Bb3","D4","F#4","Bb4"], "Faug":["F3","A3","C#4","F4"]
        };

        // --- 3. LÓGICA DE INTERACCIÓN ---
        const circle = ["C", "G", "D", "A", "E", "B", "Gb", "Db", "Ab", "Eb", "Bb", "F"];
        const nodesPos = {};
        let lastNodeId = null;
        let lastPos = null;

        function init() {
            drawRing(circle, 215, 'aug', "var(--aug)");
            drawRing(circle, 155, 'major', "var(--major)");
            drawRing(circle, 95, 'minor', "var(--minor)");

            const svg = document.getElementById('harmony-svg');

            // Soporte para Arrastre (Drag)
            const handleMove = (e) => {
                // Soporte para touch y mouse
                const x = e.clientX || (e.touches && e.touches[0].clientX);
                const y = e.clientY || (e.touches && e.touches[0].clientY);
                
                const target = document.elementFromPoint(x, y);
                if (target && target.classList.contains('node-circle')) {
                    const id = target.getAttribute('data-id');
                    if (id !== lastNodeId) {
                        triggerNode(id, target);
                    }
                }
            };

            svg.addEventListener('pointermove', handleMove);
            svg.addEventListener('pointerdown', (e) => {
                lastNodeId = null; // Reset para permitir tocar el mismo nodo al iniciar
                handleMove(e);
            });
            svg.addEventListener('pointerup', () => {
                lastNodeId = null;
                lastPos = null;
            });
        }

        function triggerNode(id, element) {
            if (Tone.context.state !== 'running') Tone.start();
            
            lastNodeId = id;
            const currentPos = nodesPos[id];

            // SONIDO: Arpegio ultra-rápido para brillo (0.04s)
            const now = Tone.now();
            const notas = arpegios[id];
            if (notas) {
                notas.forEach((n, i) => {
                    sampler.triggerAttackRelease(n, "1n", now + (i * 0.04), 0.4 + (i * 0.1));
                });
            }

            // VISUAL: Feedback del nodo
            const color = element.getAttribute("stroke");
            element.setAttribute("fill", color);
            element.setAttribute("r", parseFloat(element.getAttribute("data-orig-r")) + 6);
            setTimeout(() => {
                element.setAttribute("fill", "#050508");
                element.setAttribute("r", element.getAttribute("data-orig-r"));
            }, 300);

            // LÍNEA ACTIVA (Estela)
            if (lastPos) {
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", lastPos.x); line.setAttribute("y1", lastPos.y);
                line.setAttribute("x2", currentPos.x); line.setAttribute("y2", currentPos.y);
                line.setAttribute("class", "active-path");
                line.style.stroke = color;
                
                document.getElementById('active-layer').appendChild(line);
                
                // Efecto de desvanecimiento
                setTimeout(() => {
                    line.style.transition = "opacity 1.5s ease, stroke-width 1.5s ease";
                    line.style.opacity = "0";
                    line.style.strokeWidth = "0";
                    setTimeout(() => line.remove(), 1600);
                }, 50);
            }
            lastPos = currentPos;
        }

        function drawRing(list, radio, type, color) {
            list.forEach((name, i) => {
                const angle = (i/12) * 2 * Math.PI - Math.PI/2;
                const x = 250 + radio * Math.cos(angle);
                const y = 250 + radio * Math.sin(angle);
                
                let id = type === 'aug' ? name + "aug" : (type === 'minor' ? name + "m" : name);
                nodesPos[id] = { x, y };

                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                const r = type === 'major' ? 18 : 14;
                
                c.setAttribute("cx", x); c.setAttribute("cy", y);
                c.setAttribute("r", r);
                c.setAttribute("data-orig-r", r);
                c.setAttribute("data-id", id);
                c.setAttribute("fill", "#050508");
                c.setAttribute("stroke", color);
                c.setAttribute("stroke-width", "2");
                c.setAttribute("class", "node-circle");

                const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t.setAttribute("x", x); t.setAttribute("y", y + 4);
                t.setAttribute("text-anchor", "middle");
                t.setAttribute("class", "chord-text");
                t.textContent = type === 'aug' ? "+" : id;

                g.appendChild(c); g.appendChild(t);
                document.getElementById('nodes-layer').appendChild(g);
            });
        }

        init();
    </script>
</body>
</html>

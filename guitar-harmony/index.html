<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Harmony Engine - v2.5 (Fixed Audio)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root {
            --bg-dark: #050507;
            --major: #00d4ff;
            --minor: #ff007c;
            --guide: #deff9a;
            --current-glow: rgba(0, 212, 255, 0.05);
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center, var(--current-glow) 0%, var(--bg-dark) 85%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
            transition: background 0.6s ease;
        }

        .header h1 { font-weight: 200; letter-spacing: 5px; font-size: 0.9rem; color: #444; margin: 20px 0; }

        .controls {
            display: flex; gap: 15px; background: rgba(255,255,255,0.03);
            padding: 8px 20px; border-radius: 20px; border: 1px solid #1a1a1a;
            backdrop-filter: blur(10px); z-index: 100;
        }

        select { background: transparent; color: var(--guide); border: none; font-size: 0.8rem; cursor: pointer; outline: none; }

        #canvas-container { width: 95vw; max-width: 580px; margin-top: 10px; }
        svg { width: 100%; height: auto; }

        .node-circle { transition: all 0.3s ease; cursor: pointer; }
        .chord-text { pointer-events: none; font-weight: bold; fill: #fff; user-select: none; }

        .guide-line {
            fill: none; stroke: var(--guide); stroke-width: 2;
            stroke-dasharray: 1000; stroke-dashoffset: 1000;
            animation: drawLine 1s ease forwards;
            filter: drop-shadow(0 0 5px var(--guide));
        }

        @keyframes drawLine { to { stroke-dashoffset: 0; } }
        .status-bar { margin-top: 15px; font-size: 0.6rem; color: #333; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="header"><h1>HARMONY ENGINE PRO</h1></div>

    <div class="controls">
        <select id="pattern-select">
            <option value="none">MODO LIBRE</option>
            <option value="251">JAZZ 2-5-1 (ii-V-I)</option>
            <option value="gospel">GOSPEL (IV-V-I)</option>
            <option value="pop">POP (I-V-vi-IV)</option>
        </select>
    </div>
    
    <div id="canvas-container">
        <svg id="harmony-svg" viewBox="0 0 400 400">
            <g id="guide-layer"></g>
            <circle cx="200" cy="200" r="150" fill="none" stroke="#111" stroke-width="1" />
            <circle cx="200" cy="200" r="95" fill="none" stroke="#111" stroke-width="1" />
        </svg>
    </div>

    <div class="status-bar" id="status">CARGANDO ENGINE...</div>

    <script>
        // --- 1. DICCIONARIO MAESTRO DE NOTAS (El "Cerebro" del sonido) ---
        const diccionarioAcordes = {
            // MAYORES (Anillo Exterior)
            "C": ["C3", "E3", "G3", "B3"], "G": ["G2", "B2", "D3", "F#3"],
            "D": ["D3", "F#3", "A3", "C#4"], "A": ["A2", "C#3", "E3", "G#3"],
            "E": ["E2", "G#2", "B2", "D#3"], "B": ["B2", "D#3", "F#3", "A#3"],
            "Gb": ["Gb2", "Bb2", "Db3", "F3"], "Db": ["Db3", "F3", "Ab3", "C4"],
            "Ab": ["Ab2", "C3", "Eb3", "G3"], "Eb": ["Eb3", "G3", "Bb3", "D4"],
            "Bb": ["Bb2", "D3", "F3", "A3"], "F": ["F2", "A2", "C3", "E3"],
            // MENORES (Anillo Interior)
            "Am": ["A2", "C3", "E3", "G3"], "Em": ["E2", "G2", "B2", "D3"],
            "Bm": ["B2", "D3", "F#3", "A3"], "F#m": ["F#2", "A2", "C#3", "E3"],
            "C#m": ["C#2", "E2", "G#2", "B2"], "G#m": ["G#2", "B2", "D#3", "F#3"],
            "D#m": ["Eb2", "Gb2", "Bb2", "Db3"], "Bbm": ["Bb2", "Db3", "F3", "Ab3"],
            "Fm": ["F2", "Ab2", "C3", "Eb3"], "Cm": ["C3", "Eb3", "G3", "Bb3"],
            "Gm": ["G2", "Bb2", "D3", "F3"], "Dm": ["D3", "F3", "A3", "C4"]
        };

        // --- 2. AUDIO ENGINE ---
        const chorus = new Tone.Chorus(4, 2.5, 0.5).start();
        const reverb = new Tone.Reverb({ decay: 7, wet: 0.45 }).toDestination();
        const sampler = new Tone.Sampler({
            urls: { "E2": "E2.mp3", "A2": "A2.mp3", "D3": "D3.mp3", "G3": "G3.mp3", "B3": "B3.mp3", "E4": "E4.mp3" },
            baseUrl: "./samples/",
            attack: 0.08, release: 2.5,
            onload: () => document.getElementById('status').innerText = "ENGINE READY"
        }).connect(chorus);
        chorus.connect(reverb);

        // --- 3. TEORÍA Y PATRONES ---
        const circle = ["C", "G", "D", "A", "E", "B", "Gb", "Db", "Ab", "Eb", "Bb", "F"];
        const nodesPos = {}; 

        const patterns = {
            "251": (i) => [
                { id: circle[(i+2)%12]+'m', label: 'ii7' },
                { id: circle[(i+1)%12], label: 'V7' },
                { id: circle[i], label: 'I maj7' }
            ],
            "pop": (i) => [
                { id: circle[i], label: 'I' },
                { id: circle[(i+1)%12], label: 'V' },
                { id: circle[(i+9)%12]+'m', label: 'vi' },
                { id: circle[(i+11)%12], label: 'IV' }
            ],
            "gospel": (i) => [
                { id: circle[(i+11)%12], label: 'IV' },
                { id: circle[(i+1)%12], label: 'V' },
                { id: circle[i], label: 'I' }
            ]
        };

        // --- 4. GENERACIÓN DE INTERFAZ ---
        const svg = document.getElementById('harmony-svg');
        const guideLayer = document.getElementById('guide-layer');

        function drawNodes(list, radio, type, color) {
            list.forEach((name, i) => {
                const angle = (i/12) * 2 * Math.PI - Math.PI/2;
                const x = 200 + radio * Math.cos(angle);
                const y = 200 + radio * Math.sin(angle);
                const id = (type === 'major' ? name : name + 'm');
                nodesPos[id] = { x, y };

                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", x); c.setAttribute("cy", y);
                c.setAttribute("r", type === 'major' ? 18 : 15);
                c.setAttribute("fill", "#050507");
                c.setAttribute("stroke", color);
                c.setAttribute("stroke-width", "1.5");
                c.setAttribute("id", "node-" + id);
                c.setAttribute("class", "node-circle");

                const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t.setAttribute("x", x); t.setAttribute("y", y + 5);
                t.setAttribute("text-anchor", "middle");
                t.setAttribute("class", "chord-text");
                t.setAttribute("font-size", type === 'major' ? "12" : "10");
                t.textContent = id;

                g.appendChild(c); g.appendChild(t);
                
                const playEvent = async () => {
                    if (Tone.context.state !== 'running') await Tone.start();
                    tocar(id);
                    actualizarGuia(name, i);
                    
                    // Efectos visuales
                    document.body.style.setProperty('--current-glow', color.replace('rgb', 'rgba').replace(')', ', 0.1)'));
                    c.setAttribute("fill", color);
                    setTimeout(() => c.setAttribute("fill", "#050507"), 300);
                };

                g.addEventListener('mousedown', playEvent);
                g.addEventListener('touchstart', (e) => { e.preventDefault(); playEvent(); });
                svg.appendChild(g);
            });
        }

        drawNodes(circle, 150, 'major', "rgb(0, 212, 255)");
        drawNodes(circle, 95, 'minor', "rgb(255, 0, 124)");

        function actualizarGuia(rootName, rootIdx) {
            guideLayer.innerHTML = "";
            const mode = document.getElementById('pattern-select').value;
            if (mode === "none") return;

            const pathSteps = patterns[mode](rootIdx);
            let d = "";
            pathSteps.forEach((step, i) => {
                const pos = nodesPos[step.id];
                if (i === 0) d += `M ${pos.x} ${pos.y}`;
                else d += ` L ${pos.x} ${pos.y}`;
            });

            const line = document.createElementNS("http://www.w3.org/2000/svg", "path");
            line.setAttribute("d", d);
            line.setAttribute("class", "guide-line");
            guideLayer.appendChild(line);
        }

        // --- 5. LÓGICA DE SONIDO CORREGIDA ---
        function tocar(id) {
            const notas = diccionarioAcordes[id];
            if (!notas) return;

            const ahora = Tone.now();
            notas.forEach((nota, i) => {
                // Disparo de sampler con dinámica aleatoria y arpegio fluido
                sampler.triggerAttackRelease(
                    nota, 
                    "1n", 
                    ahora + (i * 0.13), 
                    0.5 + Math.random() * 0.4
                );
            });
        }
    </script>
</body>
</html>

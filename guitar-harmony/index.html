<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmony Engine Pro - Interactive PWA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root {
            --bg-dark: #050507;
            --major-color: #00d4ff;
            --minor-color: #ff007c;
            --current-glow: rgba(0, 212, 255, 0.08);
        }

        body {
            background-color: var(--bg-dark);
            /* Fondo dinámico reactivo */
            background-image: radial-gradient(circle at center, var(--current-glow) 0%, var(--bg-dark) 75%);
            color: #ffffff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            transition: background 0.8s ease;
            touch-action: manipulation;
        }

        h1 {
            font-weight: 200;
            letter-spacing: 6px;
            font-size: 0.9rem;
            color: #444;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        #canvas-container {
            width: 92vw;
            max-width: 580px;
            position: relative;
        }

        svg {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 0 15px rgba(0,0,0,0.6));
        }

        .node-circle {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .node-group:hover .node-circle {
            r: 22;
            filter: brightness(1.4);
        }

        .chord-text {
            pointer-events: none;
            user-select: none;
            font-weight: 600;
            fill: #fff;
        }

        .status-bar {
            margin-top: 30px;
            font-size: 0.65rem;
            color: #2a2a2a;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <h1>Harmony Engine Pro</h1>
    
    <div id="canvas-container">
        <svg id="harmony-svg" viewBox="0 0 400 400">
            <circle cx="200" cy="200" r="150" fill="none" stroke="#121212" stroke-width="1" />
            <circle cx="200" cy="200" r="95" fill="none" stroke="#121212" stroke-width="1" />
        </svg>
    </div>

    <div class="status-bar" id="status">Cargando motor de audio...</div>

    <script>
        // --- 1. CONFIGURACIÓN DE AUDIO AVANZADA (ATMOSPHERIC) ---
        // Chorus para dar movimiento y Reverb masiva para la atmósfera
        const chorus = new Tone.Chorus(4, 2.5, 0.5).start();
        const reverb = new Tone.Reverb({
            decay: 7,    // Cola de sonido muy larga (7 segundos)
            preDelay: 0.1,
            wet: 0.45    // Mezcla equilibrada entre señal seca y ambiente
        }).toDestination();

        const sampler = new Tone.Sampler({
            urls: {
                "E2": "E2.mp3", "A2": "A2.mp3", "D3": "D3.mp3",
                "G3": "G3.mp3", "B3": "B3.mp3", "E4": "E4.mp3"
            },
            baseUrl: "./samples/",
            attack: 0.05,  // Suaviza el inicio del sonido
            release: 2.5,  // Mantiene el sonido al soltar el nodo
            onload: () => {
                document.getElementById('status').innerText = "Motor Activo - Tocar para sonar";
            }
        }).connect(chorus);

        chorus.connect(reverb);

        // --- 2. MAPA ARMÓNICO (Círculo de Quintas) ---
        const circuloArmonico = {
            "C":  ["C3", "E3", "G3", "C4"], "G":  ["G2", "B2", "D3", "G3"],
            "D":  ["D3", "F#3", "A3", "D4"], "A":  ["A2", "E3", "A3", "C#4"],
            "E":  ["E2", "B2", "E3", "G#3"], "B":  ["B2", "D#3", "F#3", "B3"],
            "Gb": ["F#2", "C#3", "F#3", "A#3"], "Db": ["C#3", "G#3", "C#4", "F4"],
            "Ab": ["G#2", "Eb3", "G#3", "C4"], "Eb": ["Eb3", "G3", "Bb3", "Eb4"],
            "Bb": ["Bb2", "F3", "Bb3", "D4"], "F":  ["F2", "C3", "F3", "A3"],
            "Am": ["A2", "C3", "E3", "A3"], "Em": ["E2", "B2", "E3", "G3"],
            "Bm": ["B2", "D3", "F#3", "B3"], "F#m":["F#2", "C#3", "F#3", "A3"],
            "C#m":["C#3", "E3", "G#3", "C#4"], "G#m":["G#2", "D#3", "G#3", "B3"],
            "D#m":["D#2", "A#2", "D#3", "F#3"], "Bbm":["Bb2", "Db3", "F3", "Bb3"],
            "Fm": ["F2", "C3", "Ab3", "F3"], "Cm": ["C3", "Eb3", "G3", "C4"],
            "Gm": ["G2", "D3", "G3", "Bb3"], "Dm": ["D3", "A3", "D4", "F4"]
        };

        // --- 3. GENERACIÓN DE INTERFAZ SVG ---
        const svg = document.getElementById('harmony-svg');
        const rMayor = 150, rMenor = 95;
        const mayores = ["C", "G", "D", "A", "E", "B", "Gb", "Db", "Ab", "Eb", "Bb", "F"];
        const menores = ["Am", "Em", "Bm", "F#m", "C#m", "G#m", "D#m", "Bbm", "Fm", "Cm", "Gm", "Dm"];

        function crearNodos(lista, radio, color) {
            lista.forEach((nombre, i) => {
                const angulo = (i / lista.length) * 2 * Math.PI - Math.PI / 2;
                const x = 200 + radio * Math.cos(angulo);
                const y = 200 + radio * Math.sin(angulo);

                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                g.setAttribute("class", "node-group");

                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", x); c.setAttribute("cy", y);
                c.setAttribute("r", radio === rMayor ? "18" : "15");
                c.setAttribute("fill", "#0a0a0c");
                c.setAttribute("stroke", color);
                c.setAttribute("stroke-width", "1.5");
                c.setAttribute("class", "node-circle");

                const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t.setAttribute("x", x); t.setAttribute("y", y + 4);
                t.setAttribute("text-anchor", "middle");
                t.setAttribute("font-size", radio === rMayor ? "12" : "10");
                t.setAttribute("class", "chord-text");
                t.textContent = nombre;

                g.appendChild(c);
                g.appendChild(t);

                const disparar = async () => {
                    if (Tone.context.state !== 'running') await Tone.start();
                    
                    // Efecto de fondo dinámico según el tipo de acorde
                    const glowColor = color.replace('rgb', 'rgba').replace(')', ', 0.12)');
                    document.body.style.setProperty('--current-glow', glowColor);
                    
                    tocar(nombre);
                    
                    // Animación visual del nodo
                    c.setAttribute("fill", color);
                    setTimeout(() => c.setAttribute("fill", "#0a0a0c"), 250);
                };

                g.addEventListener('mousedown', disparar);
                g.addEventListener('touchstart', (e) => { e.preventDefault(); disparar(); });
                svg.appendChild(g);
            });
        }

        crearNodos(mayores, rMayor, "rgb(0, 212, 255)"); // Cyan
        crearNodos(menores, rMenor, "rgb(255, 0, 124)"); // Rosa

        // --- 4. LÓGICA DE RASGUEO (STRUMMING) ---
        function tocar(acorde) {
            const notas = circuloArmonico[acorde];
            const ahora = Tone.now();
            const timing = 0.14; // Velocidad del arpegio fluida

            notas.forEach((n, i) => {
                sampler.triggerAttackRelease(
                    n, 
                    "1n", // Duración de nota larga para que la reverb trabaje
                    ahora + (i * timing), 
                    0.6 + Math.random() * 0.3 // Dinámica humana
                );
            });
        }
    </script>
</body>
</html>

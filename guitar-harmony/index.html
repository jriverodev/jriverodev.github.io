<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Harmony - Full Circle System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Urbanist:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-base: #040408;
            --major-color: #00d4ff;
            --minor-color: #ff007c;
            --seventh-color: #deff9a;
            --dim-color: #ffaa00;
            --glow-m: drop-shadow(0 0 10px rgba(0, 212, 255, 0.5));
            --glow-min: drop-shadow(0 0 10px rgba(255, 0, 124, 0.5));
            --glow-style: rgba(0, 212, 255, 0.04);
        }
        
        * { box-sizing: border-box; }
        body { 
            background: var(--bg-base); 
            color: #fff; 
            font-family: 'Urbanist', sans-serif; 
            margin: 0; 
            overflow: hidden; 
            touch-action: none; 
            -webkit-user-select: none; 
            user-select: none;
            transition: background 0.8s ease;
        }

        /* Capa de atmósfera reactiva */
        #ambient-layer {
            position: absolute;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 50%, var(--glow-style) 0%, transparent 75%);
            z-index: 0; pointer-events: none;
            transition: all 0.8s ease;
        }

        /* Controles Premium */
        .dashboard-ui { 
            position: absolute; top: 25px; left: 50%; transform: translateX(-50%); 
            z-index: 10; background: rgba(10, 10, 15, 0.5); padding: 8px 16px; 
            border-radius: 40px; border: 1px solid rgba(255,255,255,0.08); 
            backdrop-filter: blur(25px); display: flex; align-items: center; gap: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .brand-title {
            font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 14px;
            letter-spacing: 1.5px; background: linear-gradient(45deg, #00d4ff, #deff9a);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            padding-right: 12px; border-right: 1px solid rgba(255,255,255,0.1);
        }

        select { 
            background: transparent; color: #fff; border: none; font-family: 'Space Grotesk', sans-serif;
            font-weight: 700; outline: none; cursor: pointer; font-size: 13px; letter-spacing: 0.5px;
            transition: color 0.3s;
        }
        select:hover { color: var(--major-color); }
        select option { background: #0c0c12; color: #fff; }

        .key-wrapper { position: relative; display: flex; align-items: center; }
        .key-wrapper::before {
            content: "🔑"; position: absolute; left: 8px; z-index: 2; font-size: 11px; opacity: 0.6;
        }
        
        input[type="password"] { 
            background: rgba(255,255,255,0.03); color: #fff; border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 20px; padding: 6px 12px 6px 28px; width: 160px; font-size: 12px;
            outline: none; transition: all 0.3s; font-family: monospace;
        }
        input[type="password"]:focus { 
            border-color: var(--major-color); background: rgba(255,255,255,0.06);
            box-shadow: 0 0 8px rgba(0,212,255,0.2);
        }

        #canvas-wrapper { width: 100vw; height: 100vh; position: relative; z-index: 1; }
        svg { width: 100%; height: 100%; }
        
        /* Elementos del Grafo */
        .node { cursor: pointer; pointer-events: all; }
        .node-circle { 
            fill: #06060c; stroke-width: 2;
            transition: stroke-width 0.2s, r 0.3s ease, fill 0.3s ease; 
        }
        .node:hover .node-circle { stroke-width: 3.5; }
        
        .chord-label { 
            pointer-events: none; fill: #ffffff; font-family: 'Space Grotesk', sans-serif;
            font-weight: 700; font-size: 13px; text-anchor: middle; dominant-baseline: central; 
        }
        .degree-label {
            pointer-events: none; fill: rgba(255,255,255,0.4); font-size: 9px;
            font-weight: 500; text-anchor: middle;
        }
        
        .link-line { fill: none; stroke-width: 1; opacity: 0.08; transition: all 0.6s ease; }
        .link-line.active-route { opacity: 0.75; stroke-width: 2.5; }
        
        #status-guide { 
            position: absolute; bottom: 25px; width: 100%; text-align: center; 
            color: rgba(255,255,255,0.3); font-size: 11px; pointer-events: none; 
            letter-spacing: 2px; font-weight: bold; font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase; z-index: 5;
        }
    </style>
</head>
<body>

    <div id="ambient-layer"></div>

    <div class="dashboard-ui">
        <div class="brand-title">NEXUS HARMONY</div>
        <select id="style-selector">
            <option value="pop">POP PROGRESSIVE</option>
            <option value="jazz_251">JAZZ (2-5-1 ENGINE)</option>
            <option value="funk">FUNK GROOVE LAYER</option>
            <option value="gospel">GOSPEL SHIMMER FLUID</option>
        </select>
        <div class="key-wrapper">
            <input type="password" id="grok-token" placeholder="xAI Grok API Key...">
        </div>
    </div>

    <div id="status-guide">Explora la rueda armónica interactiva</div>
    
    <div id="canvas-wrapper">
        <svg id="viewport">
            <g id="links-layer"></g>
            <g id="nodes-layer"></g>
        </svg>
    </div>

    <script>
        // --- CONFIGURACIÓN DE AUDIO CON TONE.JS ---
        const reverb = new Tone.Reverb({ decay: 4.5, wet: 0.35 }).toDestination();
        const delay = new Tone.FeedbackDelay("8n.", 0.25).connect(reverb);
        const outputChain = new Tone.Compressor(-10, 3).connect(delay);

        const synthEngine = new Tone.PolySynth(Tone.Synth, {
            oscillator: { type: "sine" },
            envelope: { attack: 0.06, decay: 0.1, sustain: 0.8, release: 1.4 }
        }).connect(outputChain);

        // Geometría del Círculo de Quintas Funcional Completo
        const circleOfFifths = [
            { chord: "C",  type: "major", deg: "I",   rel: "Am" },
            { chord: "G",  type: "major", deg: "V",   rel: "Em" },
            { chord: "D",  type: "major", deg: "II",  rel: "Bm" },
            { chord: "A",  type: "major", deg: "VI",  rel: "F#m" },
            { chord: "E",  type: "major", deg: "III", rel: "C#m" },
            { chord: "B",  type: "major", deg: "VII", rel: "G#m" },
            { chord: "F#", type: "major", deg: "IV#", rel: "D#m" },
            { chord: "C#", type: "major", deg: "I#",  rel: "Bbm" },
            { chord: "Ab", type: "major", deg: "VI♭", rel: "Fm" },
            { chord: "Eb", type: "major", deg: "III♭",rel: "Cm" },
            { chord: "Bb", type: "major", deg: "VII♭",rel: "Gm" },
            { chord: "F",  type: "major", deg: "IV",  rel: "Dm" }
        ];

        const pitchDictionary = {
            "C": ["C3","E3","G3","B3"], "G": ["G2","B2","D3","F#3"], "D": ["D3","F#3","A3","C#4"],
            "A": ["A2","C#3","E3","G#3"], "E": ["E2","G#2","B2","D#3"], "B": ["B2","D#3","F#3","A#3"],
            "F#":["F#2","A#2","C#3","E#3"], "C#":["C#3","E#3","G#3","B3"], "Ab":["Ab2","C3","Eb3","G3"],
            "Eb":["Eb3","G3","Bb3","D4"], "Bb":["Bb2","D3","F3","A3"], "F":["F2","A2","C3","E3"],
            "Am":["A2","C3","E3","G3"], "Em":["E2","G3","B3","D4"], "Bm":["B2","D3","F#3","A3"],
            "F#m":["F#2","A2","C#3","E3"], "C#m":["C#3","E3","G#3","B3"], "G#m":["G#2","B2","D#3","F#3"],
            "D#m":["Eb3","Gb3","Bb3","Db4"], "Bbm":["Bb2","Db3","F3","Ab3"], "Fm":["F2","Ab2","C3","Eb3"],
            "Cm":["C3","Eb3","G3","Bb3"], "Gm":["G2","Bb2","D3","F3"], "Dm":["D3","F3","A3","C4"]
        };

        const nodesLayer = document.getElementById('nodes-layer');
        const linksLayer = document.getElementById('links-layer');
        const ambientLayer = document.getElementById('ambient-layer');
        const styleSelector = document.getElementById('style-selector');
        
        let visualNodesRegistry = {};
        let activeChordId = null;

        window.addEventListener('DOMContentLoaded', buildCircleMatrix);
        window.addEventListener('resize', buildCircleMatrix);
        styleSelector.addEventListener('change', () => {
            updateStyleAtmosphere();
            if(activeChordId) triggerNodeBehavior(activeChordId, false);
        });

        // Construye de forma estática la rueda de quintas perfecta (Mayores fuera, Menores dentro)
        function buildCircleMatrix() {
            nodesLayer.innerHTML = "";
            linksLayer.innerHTML = "";
            visualNodesRegistry = {};

            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            // Radios concéntricos de la rueda armónica
            const outerRadius = Math.min(window.innerWidth, window.innerHeight) * 0.35;
            const innerRadius = outerRadius * 0.68;

            // 1. Crear las conexiones de la Red (Estructura de Araña Armónica)
            circleOfFifths.forEach((item, idx) => {
                const angle = (idx * 2 * Math.PI) / 12 - Math.PI / 2;
                
                const xOuter = centerX + outerRadius * Math.cos(angle);
                const yOuter = centerY + outerRadius * Math.sin(angle);
                const xInner = centerX + innerRadius * Math.cos(angle);
                const yInner = centerY + innerRadius * Math.sin(angle);

                // Enlace Radial (Mayor con su Relativa Menor)
                createLink(xOuter, yOuter, xInner, yInner, `${item.chord}-${item.rel}`);

                // Enlaces Perimetrales (Vecinos del círculo)
                const nextIdx = (idx + 1) % 12;
                const nextAngle = (nextIdx * 2 * Math.PI) / 12 - Math.PI / 2;
                
                const xOuterNext = centerX + outerRadius * Math.cos(nextAngle);
                const yOuterNext = centerY + outerRadius * Math.sin(nextAngle);
                const xInnerNext = centerX + innerRadius * Math.cos(nextAngle);
                const yInnerNext = centerY + innerRadius * Math.sin(nextAngle);

                createLink(xOuter, yOuter, xOuterNext, yOuterNext, `${item.chord}-${circleOfFifths[nextIdx].chord}`);
                createLink(xInner, yInner, xInnerNext, yInnerNext, `${item.rel}-${circleOfFifths[nextIdx].rel}`);
            });

            // 2. Inyectar los Nodos Interactivos en sus posiciones geométricas exactas
            circleOfFifths.forEach((item, idx) => {
                const angle = (idx * 2 * Math.PI) / 12 - Math.PI / 2;

                const xOuter = centerX + outerRadius * Math.cos(angle);
                const yOuter = centerY + outerRadius * Math.sin(angle);
                drawNode(item.chord, xOuter, yOuter, "major", item.deg);

                const xInner = centerX + innerRadius * Math.cos(angle);
                const yInner = centerY + innerRadius * Math.sin(angle);
                drawNode(item.rel, xInner, yInner, "minor", item.deg.toLowerCase());
            });

            if(activeChordId) triggerNodeBehavior(activeChordId, false);
        }

        function drawNode(id, x, y, type, degree) {
            const color = type === "major" ? "var(--major-color)" : "var(--minor-color)";
            const glow = type === "major" ? "var(--glow-m)" : "var(--glow-min)";

            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.setAttribute("class", "node");
            g.setAttribute("transform", `translate(${x}, ${y})`);

            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("class", "node-circle");
            circle.setAttribute("r", type === "major" ? 22 : 17);
            circle.setAttribute("stroke", color);
            circle.style.filter = glow;

            const textChord = document.createElementNS("http://www.w3.org/2000/svg", "text");
            textChord.setAttribute("class", "chord-label");
            textChord.setAttribute("y", "-3");
            textChord.textContent = id;

            const textDegree = document.createElementNS("http://www.w3.org/2000/svg", "text");
            textDegree.setAttribute("class", "degree-label");
            textDegree.setAttribute("y", "11");
            textDegree.textContent = degree;

            g.appendChild(circle);
            g.appendChild(textChord);
            g.appendChild(textDegree);
            nodesLayer.appendChild(g);

            g.addEventListener('pointerdown', (e) => {
                e.stopPropagation();
                if (Tone.context.state !== 'running') Tone.start();
                triggerNodeBehavior(id, true);
            });

            visualNodesRegistry[id] = { circle, color, type };
        }

        function createLink(x1, y1, x2, y2, pairId) {
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("class", "link-line");
            line.setAttribute("x1", x1); line.setAttribute("y1", y1);
            line.setAttribute("x2", x2); line.setAttribute("y2", y2);
            line.setAttribute("stroke", "rgba(255,255,255,0.4)");
            line.id = `link-${pairId}`;
            linksLayer.appendChild(line);
        }

        // --- MANEJO DE ESTILOS Y REACTIVIDAD VISUAL ---
        function updateStyleAtmosphere() {
            const currentStyle = styleSelector.value;
            let themeGlow = "rgba(0, 212, 255, 0.04)"; 
            
            if (currentStyle === "jazz_251") themeGlow = "rgba(222, 255, 154, 0.06)";
            if (currentStyle === "funk") themeGlow = "rgba(255, 170, 0, 0.05)";
            if (currentStyle === "gospel") themeGlow = "rgba(255, 0, 124, 0.05)";

            document.documentElement.style.setProperty('--glow-style', themeGlow);
        }

        function triggerNodeBehavior(chordId, shouldPlayAudio) {
            activeChordId = chordId;
            if (navigator.vibrate) navigator.vibrate(10);

            // Resetear estados visuales anteriores
            Object.keys(visualNodesRegistry).forEach(key => {
                visualNodesRegistry[key].circle.setAttribute("fill", "#06060c");
            });
            document.querySelectorAll('.link-line').forEach(line => {
                line.setAttribute("class", "link-line");
                line.setAttribute("stroke", "rgba(255,255,255,0.4)");
            });

            // Encender Nodo Seleccionado
            const activeData = visualNodesRegistry[chordId];
            if (activeData) {
                activeData.circle.setAttribute("fill", activeData.color);
            }

            // Iluminar enlaces adyacentes activos en la rueda
            document.querySelectorAll('.link-line').forEach(line => {
                if (line.id.includes(`link-${chordId}`) || line.id.endsWith(`-${chordId}`)) {
                    line.setAttribute("class", "link-line active-route");
                    line.setAttribute("stroke", activeData.color);
                }
            });

            if (shouldPlayAudio) {
                executeCognitivePipeline(chordId, styleSelector.value);
            }
        }

        // --- CONEXIÓN DIRECTA CON xAI GROK API ---
        async function executeCognitivePipeline(chordId, style) {
            const token = document.getElementById('grok-token').value.trim();

            if (!token) {
                executeFallbackAudio(chordId, style);
                return;
            }

            try {
                const response = await fetch("https://api.x.ai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "grok-4.3", 
                        messages: [
                            {
                                role: "system",
                                content: `Eres el cerebro analítico de improvisación de Nexus Harmony. Responde estrictamente con un objeto JSON válido, sin bloques de markdown (\`\`\`), introducciones ni explicaciones.
                                Diseña una frase de improvisación de 4 notas basada en el estilo seleccionado:
                                - 'pop': Arpegios limpios, estables y melódicos.
                                - 'jazz_251': Tensiones ricas (9nas, 11nas, extensiones armónicas).
                                - 'funk': Frases sincopadas y ritmos staccato muy cortos.
                                - 'gospel': Arpegios fluidos ascendentes rápidos con amplio sustain.

                                Estructura JSON requerida:
                                { "lick": [ {"note": "C3", "time": 0.0, "duration": "8n"}, ... ] }`
                            },
                            {
                                role: "user",
                                content: `Genera un lick de 4 notas óptimo para el acorde ${chordId} en el estilo ${style}. Usa notación científica anglosajona.`
                            }
                        ],
                        response_format: { type: "json_object" },
                        temperature: 0.65,
                        max_tokens: 180
                    })
                });

                if (!response.ok) throw new Error(`HTTP error ${response.status}`);

                const rawData = await response.json();
                const parsedContent = JSON.parse(rawData.choices[0].message.content);
                
                playGenerativeLick(parsedContent.lick);

            } catch (err) {
                console.warn("Grok API no disponible o credenciales inválidas. Activando motor matemático de respaldo:", err);
                executeFallbackAudio(chordId, style);
            }
        }

        function playGenerativeLick(lick) {
            const now = Tone.now();
            lick.forEach(step => {
                synthEngine.triggerAttackRelease(step.note, step.duration, now + parseFloat(step.time));
            });
        }

        function executeFallbackAudio(chordId, style) {
            const notes = pitchDictionary[chordId] || ["C3", "E3", "G3", "B3"];
            const now = Tone.now();

            if (style === "jazz_251") {
                synthEngine.triggerAttackRelease(notes[0], "4n", now);
                synthEngine.triggerAttackRelease(notes[2], "8n", now + 0.25);
                synthEngine.triggerAttackRelease(notes[1], "8n", now + 0.4);
                synthEngine.triggerAttackRelease(notes[3], "2n", now + 0.55);
            } else if (style === "funk") {
                synthEngine.triggerAttackRelease(notes[0], "16n", now);
                synthEngine.triggerAttackRelease(notes[1], "16n", now + 0.08);
                synthEngine.triggerAttackRelease(notes[2], "16n", now + 0.16);
                synthEngine.triggerAttackRelease(notes[0], "8n", now + 0.24);
            } else if (style === "gospel") {
                notes.forEach((pitch, i) => {
                    synthEngine.triggerAttackRelease(pitch, "1n", now + (i * 0.05));
                });
            } else { // Pop Progressive
                synthEngine.triggerAttackRelease(notes[0], "8n", now);
                synthEngine.triggerAttackRelease(notes[1], "8n", now + 0.15);
                synthEngine.triggerAttackRelease(notes[2], "8n", now + 0.3);
                synthEngine.triggerAttackRelease(notes[3], "4n", now + 0.45);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Harmony - Impro Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --bg: #030305; --major: #00d4ff; --minor: #ff007c; --aug: #ffcc00; --guide: #deff9a; }
        body { background: var(--bg); color: white; font-family: system-ui; margin: 0; overflow: hidden; touch-action: none; }
        .controls { margin-top: 20px; z-index: 100; background: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 20px; border: 1px solid #333; backdrop-filter: blur(10px); }
        select { background: transparent; color: var(--guide); border: none; font-weight: bold; outline: none; cursor: pointer; }
        #canvas-container { width: 100vw; height: 80vh; display: flex; justify-content: center; align-items: center; }
        svg { width: 100%; height: 100%; }
        .node-circle { transition: r 0.2s, fill 0.3s; cursor: pointer; }
        .chord-text { pointer-events: none; fill: white; font-weight: bold; font-size: 10px; }
        .active-path { fill: none; stroke-width: 4; stroke-linecap: round; filter: drop-shadow(0 0 5px white); }
    </style>
</head>
<body>

    <div class="controls">
        <select id="style-select">
            <option value="jazz">ESTILO: JAZZ GUITAR</option>
            <option value="gospel">ESTILO: GOSPEL SHIMMER</option>
            <option value="pop">ESTILO: POP ARPS</option>
        </select>
    </div>
    
    <div id="canvas-container">
        <svg id="harmony-svg" viewBox="0 0 500 500">
            <g id="active-layer"></g>
            <g id="nodes-layer"></g>
        </svg>
    </div>

    <script>
        // --- 1. CONFIGURACIÓN DE AUDIO PROFESIONAL ---
        const reverb = new Tone.Reverb({ decay: 8, wet: 0.5 }).toDestination();
        const delay = new Tone.FeedbackDelay("8n", 0.4).connect(reverb);
        const compressor = new Tone.Compressor(-20, 3).connect(delay);

        const sampler = new Tone.Sampler({
            urls: { "E2": "E2.mp3", "A2": "A2.mp3", "D3": "D3.mp3", "G3": "G3.mp3", "B3": "B3.mp3", "E4": "E4.mp3" },
            baseUrl: "./samples/",
            release: 3,
            volume: -5
        }).connect(compressor);

        // --- 2. BASE DE DATOS DE FRASES (Licks) ---
        // Aquí definimos qué notas suenan para cada acorde
        const chordData = {
            "C": ["C3","E3","G3","C4"], "G": ["G2","B2","D3","G3"], "D": ["D3","F#3","A3","D4"],
            "A": ["A2","C#3","E3","A3"], "E": ["E2","G#2","B2","E3"], "B": ["B2","D#3","F#3","B3"],
            "Gb":["Gb2","Bb2","Db3","Gb3"], "Db":["Db3","F3","Ab3","Db4"], "Ab":["Ab2","C3","Eb3","Ab3"],
            "Eb":["Eb3","G3","Bb3","Eb4"], "Bb":["Bb2","D3","F3","Bb3"], "F":["F2","A2","C3","F3"],
            "Am":["A2","C3","E3","G3"], "Em":["E2","G3","B3","D4"], "Bm":["B2","D3","F#3","A3"],
            "F#m":["F#2","A2","C#3","E3"], "C#m":["C#3","E3","G#3","B3"], "G#m":["G#2","B2","D#3","F#3"],
            "D#m":["Eb3","Gb3","Bb3","Db4"], "Bbm":["Bb2","Db3","F3","Ab3"], "Fm":["F2","Ab2","C3","Eb3"],
            "Cm":["C3","Eb3","G3","Bb3"], "Gm":["G2","Bb2","D3","F3"], "Dm":["D3","F3","A3","C4"],
            "Caug":["C3","E3","G#3","C4"], "Gaug":["G2","B2","D#3","G3"], "Daug":["D3","F#3","A#3","D4"]
        };

        // --- 3. MOTOR DE IMPROVISACIÓN ---
        function playImprovisation(id) {
            const style = document.getElementById('style-select').value;
            const notes = chordData[id] || chordData[id.replace("aug", "")]; 
            const now = Tone.now();

            if (style === "jazz") {
                // Estilo Jazz: Notas más espaciadas y con "swing"
                // Toca 1, 3, 5, 7
                sampler.triggerAttackRelease(notes[0], "4n", now);
                sampler.triggerAttackRelease(notes[2], "8n", now + 0.15);
                sampler.triggerAttackRelease(notes[1], "8n", now + 0.3);
                sampler.triggerAttackRelease(notes[3], "2n", now + 0.45);
            } else if (style === "gospel") {
                // Estilo Gospel: Acorde rápido ascendente con mucho sustain
                notes.forEach((n, i) => {
                    sampler.triggerAttackRelease(n, "1n", now + (i * 0.03));
                });
            } else {
                // Estilo Pop: Arpegio clásico rítmico
                sampler.triggerAttackRelease(notes[0], "8n", now);
                sampler.triggerAttackRelease(notes[1], "8n", now + 0.1);
                sampler.triggerAttackRelease(notes[2], "8n", now + 0.2);
                sampler.triggerAttackRelease(notes[3], "8n", now + 0.3);
            }
        }

        // --- 4. INTERFAZ Y EVENTOS ---
        const circle = ["C", "G", "D", "A", "E", "B", "Gb", "Db", "Ab", "Eb", "Bb", "F"];
        const nodesPos = {};
        let lastNodeId = null;
        let lastPos = null;

        function init() {
            drawRing(circle, 215, 'aug', "var(--aug)");
            drawRing(circle, 155, 'major', "var(--major)");
            drawRing(circle, 95, 'minor', "var(--minor)");

            const svg = document.getElementById('harmony-svg');

            const handleInteraction = (e) => {
                const x = e.clientX || (e.touches && e.touches[0].clientX);
                const y = e.clientY || (e.touches && e.touches[0].clientY);
                const target = document.elementFromPoint(x, y);

                if (target && target.classList.contains('node-circle')) {
                    const id = target.getAttribute('data-id');
                    if (id !== lastNodeId) {
                        if (Tone.context.state !== 'running') Tone.start();
                        lastNodeId = id;
                        
                        playImprovisation(id);
                        animateNode(id, target);
                    }
                }
            };

            svg.addEventListener('pointermove', handleInteraction);
            svg.addEventListener('pointerdown', handleInteraction);
            svg.addEventListener('pointerup', () => { lastNodeId = null; lastPos = null; });
        }

        function animateNode(id, el) {
            const pos = nodesPos[id];
            const color = el.getAttribute("stroke");
            
            // Efecto de pulso
            el.setAttribute("fill", color);
            el.setAttribute("r", parseFloat(el.getAttribute("data-orig-r")) + 5);
            setTimeout(() => {
                el.setAttribute("fill", "#050508");
                el.setAttribute("r", el.getAttribute("data-orig-r"));
            }, 250);

            // Dibujar línea de conexión
            if (lastPos) {
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", lastPos.x); line.setAttribute("y1", lastPos.y);
                line.setAttribute("x2", pos.x); line.setAttribute("y2", pos.y);
                line.setAttribute("class", "active-path");
                line.style.stroke = color;
                document.getElementById('active-layer').appendChild(line);
                setTimeout(() => {
                    line.style.transition = "opacity 1.5s, stroke-width 1.5s";
                    line.style.opacity = "0";
                    line.style.strokeWidth = "0";
                    setTimeout(() => line.remove(), 1600);
                }, 50);
            }
            lastPos = pos;
        }

        function drawRing(list, radio, type, color) {
            list.forEach((name, i) => {
                const angle = (i/12) * 2 * Math.PI - Math.PI/2;
                const x = 250 + radio * Math.cos(angle);
                const y = 250 + radio * Math.sin(angle);
                let id = type === 'aug' ? name + "aug" : (type === 'minor' ? name + "m" : name);
                nodesPos[id] = { x, y };

                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                const r = type === 'major' ? 18 : 14;
                c.setAttribute("cx", x); c.setAttribute("cy", y); c.setAttribute("r", r);
                c.setAttribute("data-orig-r", r); c.setAttribute("data-id", id);
                c.setAttribute("fill", "#050508"); c.setAttribute("stroke", color);
                c.setAttribute("stroke-width", "2"); c.setAttribute("class", "node-circle");

                const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t.setAttribute("x", x); t.setAttribute("y", y + 4);
                t.setAttribute("text-anchor", "middle"); t.setAttribute("class", "chord-text");
                t.textContent = type === 'aug' ? "+" : id;

                g.appendChild(c); g.appendChild(t);
                document.getElementById('nodes-layer').appendChild(g);
            });
        }

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizador de PDFs (ZIP y RAR) - PWA</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-unrar-js@0.11.1/dist/js-unrar.min.js"></script>
    
    <link rel="manifest" href="./manifest.json">
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center p-6 text-slate-800">

    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-2xl">
        <h1 class="text-2xl font-bold text-blue-600 mb-2 text-center">Organizador de PDFs Multi-formato</h1>
        <p class="text-xs text-slate-500 mb-6 text-center">Soporta archivos comprimidos de tipo .zip y .rar</p>

        <div class="mb-5">
            <label class="block text-sm font-bold mb-2 text-slate-700">Lista de Trabajadores (Cédula, Nombres, Proceso):</label>
            <textarea id="txtData" rows="6" class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-400 text-xs font-mono bg-slate-50" placeholder="cedula,nombres,proceso..."></textarea>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-bold mb-2 text-slate-700">Subir Archivo (.ZIP o .RAR):</label>
            <input type="file" id="compressedInput" accept=".zip,.rar" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer" disabled />
            <p id="warningTxt" class="text-xs text-amber-600 mt-1">⚠️ Primero debes ingresar o validar la lista de trabajadores de arriba.</p>
        </div>

        <button id="processBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 disabled:opacity-50" disabled>
            Procesar y Descargar ZIP Organizado
        </button>

        <div class="mt-6">
            <h3 class="text-sm font-bold text-slate-700 mb-2">Historial de acciones:</h3>
            <div id="logOutput" class="w-full p-4 bg-slate-900 text-green-400 font-mono text-xs rounded-lg h-48 overflow-y-auto whitespace-pre-wrap">Esperando base de datos...</div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Registro básico opcional del Service Worker para funcionamiento Offline
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log("SW no registrado", err));
        }
    </script>
</body>
</html>

        // Elementos del DOM
        const txtData = document.getElementById('txtData');
        const zipInput = document.getElementById('zipInput');
        const processBtn = document.getElementById('processBtn');
        const logOutput = document.getElementById('logOutput');
        const warningTxt = document.getElementById('warningTxt');

        // Inicializar datos del textarea
        txtData.value = defaultDatabase;
        let empleadosMap = new Map();

        function log(message) {
            logOutput.textContent += message + "\n";
            logOutput.scrollTop = logOutput.scrollHeight;
        }

        // Procesar el texto plano estructurándolo en un Map para búsquedas ultrarrápidas
        function parseEmpleados() {
            empleadosMap.clear();
            const lines = txtData.value.split('\n');
            let count = 0;

            lines.forEach(line => {
                if (!line.trim() || line.startsWith('cedula')) return; // Saltar cabeceras o líneas vacías
                
                const partes = line.split(',');
                if (partes.length >= 3) {
                    // Limpiamos los espacios extras (como los de la cédula)
                    const cedula = partes[0].trim();
                    const nombre = partes[1].trim();
                    const proceso = partes[2].trim();

                    empleadosMap.set(cedula, { nombre, proceso });
                    count++;
                }
            });

            if (count > 0) {
                log(`✔️ Base de datos cargada: ${count} empleados detectados.`);
                zipInput.disabled = false;
                processBtn.disabled = false;
                warningTxt.classList.add('hidden');
            } else {
                log(`❌ Error: No se detectaron datos válidos en el cuadro de texto.`);
                zipInput.disabled = true;
                processBtn.disabled = true;
                warningTxt.classList.remove('hidden');
            }
        }

        // Listener para cambios en el texto
        txtData.addEventListener('input', parseEmpleados);
        // Ejecutar al cargar la página
        parseEmpleados();

        // Lógica principal de descompresión, renombrado y re-empaquetado
        processBtn.addEventListener('click', async () => {
            const file = zipInput.files[0];
            if (!file) {
                log("❌ Por favor, selecciona primero un archivo ZIP.");
                return;
            }

            log("🚀 Iniciando procesamiento del archivo ZIP...");
            processBtn.disabled = true;

            try {
                const zip = new JSZip();
                // Cargar el zip original
                const loadedZip = await zip.loadAsync(file);
                const nuevoZip = new JSZip();

                let archivosProcesados = 0;
                let archivosIgnorados = 0;

                // Promesas para procesar todos los archivos internos en paralelo
                const promesas = [];

                loadedZip.forEach((relativeArrPath, zipEntry) => {
                    // Ignorar si es una carpeta interna propia del zip original
                    if (zipEntry.dir) return;

                    // Extraer solo el nombre del archivo sin la ruta si viene de carpetas internas
                    const fullFileName = zipEntry.name.split('/').pop();
                    if (!fullFileName.toLowerCase().endsWith('.pdf')) {
                        archivosIgnorados++;
                        return; 
                    }

                    // Expresión Regular para capturar lo que está después de "T-" hasta antes de ".pdf"
                    // Maneja variaciones previas y limpia espacios.
                    const match = fullFileName.match(/T-([\d\s]+)\.pdf$/i);

                    if (match) {
                        const cedulaExtraida = match[1].trim(); // '.trim()' elimina los 2 espacios del final de la cédula

                        // Buscar si la cédula existe en la lista provista
                        if (empleadosMap.has(cedulaExtraida)) {
                            const datos = empleadosMap.get(cedulaExtraida);
                            
                            // Definimos el nuevo nombre completo: "CEDULA - NOMBRE.pdf"
                            const nuevoNombreArchivo = `${cedulaExtraida} - ${datos.nombre}.pdf`;
                            // Definimos la ruta de la carpeta basándonos en el PROCESO
                            const rutaConCarpeta = `${datos.proceso}/${nuevoNombreArchivo}`;

                            // Leer el contenido del archivo original en formato binario (Blob)
                            const promesaArchivo = zipEntry.async("blob").then(content => {
                                // Agregar al nuevo ZIP estructurado en subcarpetas automáticamente
                                nuevoZip.file(rutaConCarpeta, content);
                                archivosProcesados++;
                            });
                            promesas.push(promesaArchivo);
                        } else {
                            // Si la cédula no está en el listado de empleados, lo mete en una carpeta de "No encontrados"
                            const promesaArchivo = zipEntry.async("blob").then(content => {
                                nuevoZip.file(`NO_ENCONTRADOS/${fullFileName}`, content);
                                archivosProcesados++;
                                log(`⚠️ Cédula ${cedulaExtraida} no encontrada en la lista de trabajadores. Guardado en 'NO_ENCONTRADOS'.`);
                            });
                            promesas.push(promesaArchivo);
                        }
                    } else {
                        archivosIgnorados++;
                        log(`❌ Archivo ignorado por formato incorrecto: ${fullFileName}`);
                    }
                });

                // Esperar que todos los archivos terminen de leerse
                await Promise.all(promesas);

                if (archivosProcesados === 0) {
                    log("❌ No se encontraron PDFs válidos para renombrar dentro del ZIP.");
                    processBtn.disabled = false;
                    return;
                }

                log(`📦 Generando nuevo archivo ZIP... (${archivosProcesados} PDFs organizados)`);
                
                // Generar el nuevo archivo ZIP descargable
                const blobGenerado = await nuevoZip.generateAsync({ type: "blob" });
                
                // Trigger de descarga automática en el navegador
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blobGenerated);
                link.download = "PDFs_Organizados_por_Proceso.zip";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                log("✔️ ¡Éxito! El archivo ZIP ha sido descargado automáticamente.");

            } catch (error) {
                log(`❌ Error crítico al procesar: ${error.message}`);
                console.error(error);
            } finally {
                processBtn.disabled = false;
            }
        });
